<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>輔大聖心高中｜校車路線地圖（單一路線版）</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #eef3fb;
      --panel: rgba(255,255,255,.95);
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbe4f0;
      --shadow: 0 14px 36px rgba(15,23,42,.12);
      --topbar-h: 68px;
      --sidebar-w: 332px;
      --active: #005BFF;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Noto Sans TC', system-ui, sans-serif; background: var(--bg); color: var(--text); }
    body { display: flex; flex-direction: column; }
    button { font: inherit; }
    .topbar {
      height: var(--topbar-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      background: linear-gradient(135deg, #0b1327 0%, #16233f 100%);
      color: white;
      box-shadow: 0 10px 28px rgba(11,19,39,.24);
      z-index: 1000;
    }
    .brand { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .brand-icon {
      width: 44px; height: 44px; border-radius: 14px;
      display: grid; place-items: center;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      font-size: 22px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.28);
      flex-shrink: 0;
    }
    .brand-title { font-size: 21px; font-weight: 900; letter-spacing: .02em; }
    .brand-sub { font-size: 12px; opacity: .82; margin-top: 2px; }
    .top-pill {
      padding: 10px 14px; border-radius: 999px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.16);
      font-size: 12px; font-weight: 800;
      white-space: nowrap;
    }

    #app { flex: 1; min-height: 0; display: flex; position: relative; }
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: rgba(247,250,255,.96);
      backdrop-filter: blur(18px);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 900;
      transition: transform .26s ease;
    }
    #map-wrap { flex: 1; min-width: 0; position: relative; }
    #map { width: 100%; height: 100%; }
    #edgeToggle {
      position: absolute;
      left: calc(var(--sidebar-w) - 12px);
      top: 50%;
      transform: translateY(-50%);
      z-index: 980;
      width: 26px;
      height: 78px;
      border-radius: 0 14px 14px 0;
      border: 1px solid var(--border);
      border-left: none;
      background: white;
      box-shadow: 8px 0 24px rgba(15,23,42,.12);
      cursor: pointer;
      color: #334155;
      font-size: 18px;
      font-weight: 900;
    }
    body.sidebar-collapsed #sidebar { transform: translateX(-100%); }
    body.sidebar-collapsed #edgeToggle { left: 8px; }
    body.sidebar-collapsed #edgeToggle .arrow { transform: rotate(180deg); }
    #edgeToggle .arrow { display: inline-block; transition: transform .2s ease; }

    .sidebar-scroll { flex: 1; overflow: auto; padding: 16px 14px 22px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: 0 8px 20px rgba(15,23,42,.05);
      overflow: hidden;
    }
    .section-title {
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .08em;
      color: #334155;
      margin: 0 0 10px 2px;
    }
    .route-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .route-btn {
      position: relative;
      border: 1px solid var(--border);
      background: white;
      border-radius: 18px;
      padding: 12px 12px 10px;
      text-align: left;
      cursor: pointer;
      transition: .18s ease;
      overflow: hidden;
    }
    .route-btn::before {
      content: '';
      position: absolute;
      inset: 0 auto 0 0;
      width: 7px;
      background: var(--color);
    }
    .route-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(15,23,42,.08);
      border-color: color-mix(in srgb, var(--color) 30%, white);
    }
    .route-btn.active {
      background: linear-gradient(135deg, color-mix(in srgb, var(--color) 18%, white), white 65%);
      border-color: var(--color);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--color) 18%, white), 0 14px 24px rgba(15,23,42,.10);
    }
    .route-btn.active .route-btn-name,
    .route-btn.active .route-btn-meta { color: #0f172a; }
    .route-btn-name { font-size: 18px; font-weight: 900; line-height: 1; padding-left: 10px; }
    .route-btn-meta { font-size: 11px; color: var(--muted); padding-left: 10px; margin-top: 7px; line-height: 1.4; }
    .route-btn-count {
      position: absolute; right: 10px; top: 10px;
      padding: 5px 8px; border-radius: 999px;
      background: var(--color); color: white;
      font-size: 11px; font-weight: 900;
    }

    .summary-card {
      margin-top: 14px;
      padding: 16px 16px 14px;
      border-radius: 22px;
      color: white;
      background: linear-gradient(135deg, var(--active), color-mix(in srgb, var(--active) 68%, white));
      box-shadow: 0 14px 26px color-mix(in srgb, var(--active) 24%, rgba(15,23,42,.12));
    }
    .summary-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }
    .summary-name { font-size: 26px; font-weight: 900; line-height: 1; }
    .summary-region { font-size: 13px; opacity: .93; margin-top: 8px; }
    .summary-chip {
      padding: 7px 10px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.15);
      font-size: 12px; font-weight: 800;
      white-space: nowrap;
    }
    .summary-meta {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px;
    }
    .summary-meta span {
      padding: 7px 10px; border-radius: 999px;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.14);
      font-size: 12px; font-weight: 800;
    }

    .status-card {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.96);
      color: #334155;
      font-size: 12px;
      line-height: 1.6;
    }
    .status-card strong { color: #0f172a; }
    .status-dot {
      display: inline-block;
      width: 9px; height: 9px; border-radius: 999px;
      background: #f59e0b; margin-right: 6px;
      vertical-align: middle;
    }
    .status-dot.ok { background: #10b981; }

    .stops-panel { margin-top: 14px; }
    .stops-head {
      padding: 16px 16px 14px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(248,250,255,.92));
    }
    .stops-head-title { font-size: 16px; font-weight: 900; }
    .stops-head-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .stops-list {
      padding: 12px 10px 14px;
      max-height: 50vh;
      overflow: auto;
      background: rgba(255,255,255,.94);
    }
    .stop-item {
      position: relative;
      display: block;
      width: 100%;
      border: none;
      background: transparent;
      padding: 10px 10px 10px 38px;
      text-align: left;
      border-radius: 16px;
      cursor: pointer;
      transition: .16s ease;
    }
    .stop-item:hover {
      background: color-mix(in srgb, var(--active) 8%, white);
    }
    .stop-item.active {
      background: color-mix(in srgb, var(--active) 12%, white);
    }
    .stop-dot {
      position: absolute;
      left: 10px; top: 10px;
      width: 20px; height: 20px; border-radius: 999px;
      background: var(--active);
      color: white;
      display: grid; place-items: center;
      font-size: 10px; font-weight: 900;
      box-shadow: 0 0 0 4px white;
    }
    .stop-item.school .stop-dot { background: #e11d48; }
    .stop-name { font-size: 14px; font-weight: 800; color: #0f172a; line-height: 1.35; }
    .stop-coord { margin-top: 4px; font-size: 11px; color: #64748b; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .stop-item.active .stop-name { color: var(--active); }

    .map-hint {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 700;
      background: rgba(255,255,255,.94);
      border: 1px solid rgba(226,232,240,.95);
      border-radius: 18px;
      padding: 14px 16px;
      box-shadow: 0 12px 26px rgba(15,23,42,.10);
      max-width: min(400px, calc(100vw - 32px));
    }
    .map-hint-title { font-size: 14px; font-weight: 900; }
    .map-hint-sub { font-size: 12px; color: var(--muted); line-height: 1.6; margin-top: 6px; }

    .leaflet-control-zoom {
      border: none !important;
      box-shadow: 0 10px 24px rgba(15,23,42,.14);
      overflow: hidden;
      border-radius: 16px;
    }
    .leaflet-control-zoom a {
      width: 38px !important;
      height: 38px !important;
      line-height: 38px !important;
      font-size: 18px !important;
    }
    .leaflet-popup-content-wrapper {
      border-radius: 18px;
      box-shadow: 0 14px 34px rgba(15,23,42,.18);
    }
    .leaflet-popup-content { margin: 14px 16px; min-width: 200px; }
    .stop-popup-title { font-size: 15px; font-weight: 900; color: #0f172a; }
    .stop-popup-sub { margin-top: 6px; font-size: 12px; color: #64748b; line-height: 1.6; }
    .leaflet-control-attribution { font-size: 11px; }

    @media (max-width: 900px) {
      :root { --sidebar-w: min(88vw, 340px); }
      #sidebar {
        position: absolute; left: 0; top: 0; bottom: 0;
        box-shadow: 14px 0 30px rgba(15,23,42,.16);
      }
      .brand-title { font-size: 18px; }
      .brand-sub { display: none; }
      .top-pill { display: none; }
      .map-hint { top: 12px; left: 12px; right: 12px; max-width: none; }
      .stops-list { max-height: 44vh; }
    }
  </style>
</head>

  <div id="app">

        <section class="panel stops-panel">

    <button id="edgeToggle" aria-label="切換側欄"><span class="arrow">❮</span></button>

    <main id="map-wrap">

      </div>
    </main>
  </div>
