<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>輔大聖心高中 校車路線系統</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100dvh; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; background-color: #f8fafc; }
        body { display: flex; flex-direction: column; }
        #main-container { flex: 1; display: flex; flex-direction: row; position: relative; overflow: hidden; width: 100%; }

        /* 側邊欄與動畫設定 */
        #sidebar {
            width: 340px; height: 100%; background-color: #f8fafc; border-right: 1px solid #e2e8f0;
            z-index: 3000; display: flex; flex-direction: column;
            transition: transform 0.3s ease, margin-left 0.3s ease; position: relative; flex-shrink: 0; overflow: visible; 
        }
        #region-list { flex: 1; overflow-y: auto; padding-bottom: 20px; }
        #sidebar-close-btn {
            position: absolute; top: 50%; right: -28px; width: 28px; height: 60px;
            background-color: #fff; border: 1px solid #e2e8f0; border-left: none;
            border-radius: 0 8px 8px 0; box-shadow: 4px 0 8px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #64748b; transform: translateY(-50%); z-index: 3001; transition: 0.2s;
        }
        #sidebar-close-btn:hover { background-color: #f1f5f9; color: #2563eb; }
        body.sidebar-collapsed #sidebar-close-btn i { transform: rotate(180deg); }

        #map-wrapper { flex: 1; position: relative; height: 100%; width: 100%; z-index: 1; }
        #map { width: 100%; height: 100%; z-index: 1; outline: none; }

        @media (min-width: 769px) {
            #sidebar { margin-left: 0; }
            body.sidebar-collapsed #sidebar { margin-left: -340px; }
            #info-panel {
                position: absolute; top: 20px; right: 20px; width: 360px; border-radius: 12px; max-height: calc(100% - 40px);
                transform: translateX(120%); z-index: 1001; background: white; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
                transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); display: flex; flex-direction: column; overflow: hidden;
            }
            #info-panel.show { transform: translateX(0); }
            #info-panel.show.minimized { max-height: 5rem; }
            #sidebar-overlay { display: none !important; }
        }

        @media (max-width: 768px) {
            body { padding-top: 0; }
            #sidebar { position: absolute; left: 0; top: 0; bottom: 0; width: 280px; transform: translateX(0); box-shadow: 4px 0 25px rgba(0,0,0,0.15); }
            body.sidebar-collapsed #sidebar { transform: translateX(-100%); }
            #info-panel {
                position: absolute; bottom: 0; left: 0; width: 100%; background: white; z-index: 1002; border-radius: 20px 20px 0 0;
                box-shadow: 0 -4px 20px rgba(0,0,0,0.15); transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
                transform: translateY(100%); max-height: 70vh; padding-bottom: env(safe-area-inset-bottom); display: flex; flex-direction: column;
            }
            #info-panel.show { transform: translateY(0); }
            #info-panel.show.minimized { transform: translateY(calc(100% - 5rem - env(safe-area-inset-bottom))); }
        }

        .route-btn { width: 100%; text-align: left; padding: 1rem 1.25rem; font-weight: 700; color: #334155; cursor: pointer; background: white; border-bottom: 1px solid #f1f5f9; transition: 0.2s; display: flex; flex-direction: column; gap: 0.25rem;}
        .route-btn:hover { background-color: #f8fafc; }
        .route-btn.active { background-color: #eff6ff; color: #2563eb; border-left: 4px solid #2563eb; }
        .route-desc { font-size: 0.8rem; font-weight: normal; color: #64748b; }
        
        #sidebar-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.3); z-index: 2999; backdrop-filter: blur(2px); transition: opacity 0.3s; opacity: 0; pointer-events: none;}
        @media (max-width: 768px) { body:not(.sidebar-collapsed) #sidebar-overlay { display: block; opacity: 1; pointer-events: auto; } }
        
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

        .timeline-item { position: relative; padding-left: 1.5rem; padding-bottom: 1rem; border-left: 2px solid #93c5fd; margin-left: 0.5rem; }
        .timeline-item:last-child { border-left-color: transparent; }
        .timeline-item::before { content: ''; position: absolute; left: -0.35rem; top: 0.2rem; width: 0.6rem; height: 0.6rem; border-radius: 50%; background: white; border: 2px solid #3b82f6; }
        .timeline-item.destination::before { background: #ef4444; border: 2px solid #b91c1c; }
        .stop-name { font-size: 0.9rem; color: #334155; line-height: 1.2; }
    </style>
</head>
<body>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div id="main-container">
        <div id="sidebar">
            <div id="sidebar-close-btn" onclick="toggleSidebar()" title="切換選單">
                <i class="fa-solid fa-chevron-left"></i>
            </div>
            <div class="p-5 border-b border-slate-200 bg-white sticky top-0 z-20 shadow-sm">
                <h1 class="text-xl font-bold text-slate-800 flex items-center gap-2 mb-1">
                    <span class="bg-blue-600 text-white rounded p-1 text-sm"><i class="fa-solid fa-bus"></i></span>
                    <span>校車路線系統</span>
                </h1>
                <p class="text-xs text-slate-500 mb-3 ml-8">輔大聖心高中</p>
                <div class="relative mt-2">
                    <input type="text" id="search-input" placeholder="搜尋路線或站牌名稱..." 
                        class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-slate-700">
                    <i class="fa-solid fa-magnifying-glass text-slate-400 absolute left-3 top-4"></i>
                </div>
            </div>
            <div id="region-list"></div>
        </div>

        <div id="map-wrapper">
            <div id="map"></div>
            
            <div id="info-panel">
                <div id="panel-header" onclick="togglePanelSize()" class="bg-gradient-to-r from-blue-600 to-blue-400 rounded-t-lg p-4 flex items-center relative cursor-pointer hover:opacity-95 transition-opacity">
                    <div class="md:hidden absolute top-2 left-1/2 -translate-x-1/2 w-10 h-1 bg-white/30 rounded-full"></div>
                    <div class="text-white w-full pr-8 drop-shadow-md">
                        <h2 id="panel-title" class="text-xl font-bold leading-none">請選擇路線</h2>
                        <p id="panel-subtitle" class="text-xs opacity-90 mt-1">點擊左側列表在地圖上繪製路線</p>
                    </div>
                    <div class="flex items-center gap-4 text-white">
                        <i id="toggle-icon" class="fa-solid fa-chevron-down text-sm transition-transform md:hidden"></i>
                        <button onclick="event.stopPropagation(); closeInfoPanel()" class="p-1 hover:text-white/80">
                            <i class="fa-solid fa-xmark text-lg"></i>
                        </button>
                    </div>
                </div>
                <div class="p-4 overflow-y-auto bg-white flex-1" id="stops-container">
                    <div class="text-center text-slate-400 text-sm mt-4">👈 請從左側選單點選路線</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

        const regionList = document.getElementById('region-list');
        const searchInput = document.getElementById('search-input');
        const stopsContainer = document.getElementById('stops-container');

        function renderSidebar(filterText = "") {
            regionList.innerHTML = "";
            let hasResult = false;
            
            ROUTES_DATA.forEach(route => {
                const isRouteMatch = route.name.includes(filterText) || route.region.includes(filterText);
                const matchingStops = route.stops.filter(s => s[0].includes(filterText));
                
                if (filterText && !isRouteMatch && matchingStops.length === 0) return;
                hasResult = true;

                const btn = document.createElement('button');
                btn.className = "route-btn";
                btn.innerHTML = `
                    <div class="flex justify-between w-full items-center">
                        <span>${route.name}</span>
                        <span class="text-xs font-normal text-blue-600 bg-blue-100 px-2 py-1 rounded-full">${route.stops.length} 站</span>
                    </div>
                    <div class="route-desc"><i class="fa-solid fa-map-location-dot mr-1"></i> ${route.region}</div>
                `;
                
                btn.onclick = () => {
                    document.querySelectorAll('.route-btn').forEach(el => el.classList.remove('active'));
                    btn.classList.add('active');
                    drawRouteOnMap(route);
                };

                regionList.appendChild(btn);
            });

            if (!hasResult) regionList.innerHTML = `<div class="p-8 text-center text-slate-400"><p class="text-2xl mb-2">🤔</p><p class="text-sm">找不到相關的路線</p></div>`;
        }

        function drawRouteOnMap(route) {
            // 1. 清除舊的路線軌跡
            routeLayerGroup.clearLayers();

            // 2. 提取經緯度並繪製折線 (Polyline)
            const latlngs = route.stops.map(stop => [stop[1], stop[2]]);
            const polyline = L.polyline(latlngs, {
                color: '#3b82f6', // 藍色線條
                weight: 5,
                opacity: 0.8,
                lineJoin: 'round'
            }).addTo(routeLayerGroup);

            // 3. 在每個站點加上小圓點標記 (CircleMarker)
            route.stops.forEach((stop, index) => {
                const isSchool = index === route.stops.length - 1;
                if (!isSchool) { // 學校已經有專屬的大 icon，不重複加小圓點
                    L.circleMarker([stop[1], stop[2]], {
                        radius: 6,
                        color: 'white',
                        weight: 2,
                        fillColor: '#f59e0b', // 橘黃色站牌點
                        fillOpacity: 1
                    })
                    .bindPopup(`<b>${index + 1}. ${stop[0]}</b>`)
                    .addTo(routeLayerGroup);
                }
            });

            // 4. 更新右側資訊卡
            document.getElementById('panel-title').textContent = route.name;
            document.getElementById('panel-subtitle').textContent = route.region;
            
            let stopsHTML = '<div class="pt-2">';
            route.stops.forEach((stop, index) => {
                const isLast = index === route.stops.length - 1;
                stopsHTML += `
                    <div class="timeline-item ${isLast ? 'destination' : ''}">
                        <div class="stop-name ${isLast ? 'font-bold text-red-600' : ''}">${stop[0]}</div>
                    </div>
                `;
            });
            stopsHTML += '</div>';
            stopsContainer.innerHTML = stopsHTML;

            // 5. 動畫：將地圖視野縮放到能看見「整條路線」的範圍
            map.fitBounds(polyline.getBounds(), { padding: [50, 50], maxZoom: 15 });

            // 開啟資訊面板 & 手機版收合選單
            document.getElementById('info-panel').classList.add('show', 'minimized');
            if (window.innerWidth < 768) document.body.classList.add('sidebar-collapsed');
        }

        searchInput.addEventListener('input', (e) => renderSidebar(e.target.value.trim()));
        function togglePanelSize() { document.getElementById('info-panel').classList.toggle('minimized'); }
        function closeInfoPanel() { 
            document.getElementById('info-panel').classList.remove('show', 'minimized'); 
            document.querySelectorAll('.route-btn').forEach(el => el.classList.remove('active'));
            routeLayerGroup.clearLayers(); // 關閉面板時清空路線
            map.flyTo(SCHOOL_COORD, 13);
        }
        function toggleSidebar() { 
            document.body.classList.toggle('sidebar-collapsed'); 
            setTimeout(() => { map.invalidateSize(); }, 300); 
        }
        
        // 初始化
        renderSidebar();
        if (window.innerWidth <= 768) document.body.classList.add('sidebar-collapsed');
    </script>
</body>
</html>
