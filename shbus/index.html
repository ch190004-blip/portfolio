<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>輔大聖心高中 校車路線系統｜精簡維修版</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin:0; padding:0; width:100%; height:100dvh; overflow:hidden; font-family:'Noto Sans TC',sans-serif; background:#f8fafc; }
    body { display:flex; flex-direction:column; }
    #app { flex:1; display:flex; min-height:0; }
    #sidebar {
      width: 350px; max-width: 88vw; background:#f8fafc; border-right:1px solid #e2e8f0;
      display:flex; flex-direction:column; position:relative; z-index:1200; transition:transform .28s ease;
    }
    #map-wrap { flex:1; position:relative; min-width:0; }
    #map { width:100%; height:100%; }
    #sidebar-toggle {
      position:absolute; top:50%; right:-28px; width:28px; height:64px; border-radius:0 10px 10px 0;
      background:#fff; border:1px solid #e2e8f0; border-left:none; box-shadow:4px 0 12px rgba(0,0,0,.08);
      display:flex; align-items:center; justify-content:center; cursor:pointer; color:#64748b;
      transform:translateY(-50%); z-index:1300;
    }
    body.sidebar-collapsed #sidebar { transform:translateX(-100%); }
    body.sidebar-collapsed #sidebar-toggle i { transform:rotate(180deg); }
    #mobile-mask {
      display:none; position:absolute; inset:0; background:rgba(15,23,42,.22); z-index:1100; backdrop-filter:blur(1px);
    }
    .route-btn {
      width:100%; text-align:left; padding:14px 16px; background:#fff; border-bottom:1px solid #eef2f7;
      transition:.18s; display:flex; flex-direction:column; gap:.35rem; cursor:pointer;
    }
    .route-btn:hover { background:#f8fbff; }
    .route-btn.active { background:#eff6ff; border-left:4px solid #2563eb; padding-left:12px; }
    .panel-card { background:#fff; border:1px solid #e2e8f0; border-radius:16px; box-shadow:0 4px 14px rgba(15,23,42,.06); }
    .stop-card {
      background:#fff; border:1px solid #e2e8f0; border-radius:14px; padding:12px; margin-bottom:10px; cursor:pointer; transition:.16s;
    }
    .stop-card:hover { border-color:#93c5fd; background:#f8fbff; }
    .stop-card.active { border-color:#2563eb; background:#eff6ff; box-shadow:0 0 0 2px rgba(37,99,235,.08); }
    .coord-input {
      width:100%; border:1px solid #cbd5e1; border-radius:10px; padding:8px 10px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
      font-size:13px; outline:none;
    }
    .coord-input:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.12); }
    .tiny-note { font-size:12px; color:#64748b; }
    .timeline-item { position:relative; padding-left:1.35rem; padding-bottom:.9rem; border-left:2px solid #93c5fd; margin-left:.45rem; }
    .timeline-item:last-child { border-left-color:transparent; }
    .timeline-item::before {
      content:''; position:absolute; left:-0.34rem; top:.18rem; width:.58rem; height:.58rem; border-radius:999px; background:#fff; border:2px solid #3b82f6;
    }
    .timeline-item.destination::before { background:#ef4444; border-color:#b91c1c; }
    #user-info {
      position:absolute; right:18px; top:18px; width:360px; max-width:calc(100% - 36px); max-height:calc(100% - 36px);
      background:#fff; border-radius:18px; box-shadow:0 10px 28px rgba(15,23,42,.18); overflow:hidden; z-index:1000; display:none; flex-direction:column;
    }
    #user-info.show { display:flex; }
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:999px; }
    @media (max-width: 768px) {
      #sidebar { position:absolute; left:0; top:0; bottom:0; box-shadow:6px 0 20px rgba(0,0,0,.12); }
      #user-info {
        right:0; left:0; top:auto; bottom:0; width:100%; max-width:100%; max-height:66vh; border-radius:20px 20px 0 0;
      }
      #mobile-mask { display:block; opacity:0; pointer-events:none; transition:opacity .25s ease; }
      body:not(.sidebar-collapsed) #mobile-mask { opacity:1; pointer-events:auto; }
      body.sidebar-collapsed #sidebar { transform:translateX(-100%); }
      #sidebar-toggle { right:-26px; width:26px; }
    }
  </style>
</head>
<body class="sidebar-collapsed">
  <div class="h-16 bg-slate-900 text-white flex items-center justify-between px-4 md:px-6 shadow-md z-[1400] shrink-0">
    <div class="flex items-center gap-3 min-w-0">
      <div class="w-9 h-9 rounded-xl bg-blue-600 flex items-center justify-center shrink-0"><i class="fa-solid fa-bus"></i></div>
      <div class="min-w-0">
        <div class="font-bold leading-tight truncate">輔大聖心高中 校車路線系統</div>
        <div class="text-[11px] text-slate-300">精簡維修版｜拉點後下載 CSV 給管理者更新</div>
      </div>
    </div>
    <div class="flex items-center gap-2 shrink-0">
      <button id="userModeBtn" class="px-3 py-2 rounded-xl bg-blue-600 text-sm font-bold" onclick="switchMode('user')"><i class="fa-solid fa-map-location-dot mr-1"></i>前台</button>
      <button id="adminModeBtn" class="px-3 py-2 rounded-xl bg-slate-700 text-sm font-bold" onclick="switchMode('admin')"><i class="fa-solid fa-screwdriver-wrench mr-1"></i>維修</button>
    </div>
  </div>

  <div id="app">
    <div id="mobile-mask" onclick="toggleSidebar(false)"></div>

    <aside id="sidebar">
      <button id="sidebar-toggle" onclick="toggleSidebar()" title="切換側欄"><i class="fa-solid fa-chevron-right"></i></button>

      <section id="userSection" class="flex flex-col h-full">
        <div class="p-4 border-b border-slate-200 bg-white sticky top-0 z-10">
          <div class="panel-card p-4">
            <div class="font-bold text-slate-800 flex items-center gap-2"><i class="fa-solid fa-route text-blue-600"></i>路線查詢</div>
            <div class="tiny-note mt-1">搜尋路線或站牌名稱，點一下即可看全線。</div>
            <div class="relative mt-3">
              <input id="search-input" type="text" placeholder="搜尋路線或站牌名稱..." class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-slate-700">
              <i class="fa-solid fa-magnifying-glass text-slate-400 absolute left-3 top-4"></i>
            </div>
          </div>
        </div>
        <div id="route-list" class="flex-1 overflow-y-auto"></div>
      </section>

      <section id="adminSection" class="hidden flex-col h-full">
        <div class="p-4 border-b border-slate-200 bg-white sticky top-0 z-10 space-y-3">
          <div class="panel-card p-4">
            <div class="font-bold text-slate-800 flex items-center gap-2"><i class="fa-solid fa-screwdriver-wrench text-emerald-600"></i>總務處簡易維修</div>
            <div class="tiny-note mt-1">只保留最常用功能：選路線、點站牌、拖曳修正、下載 CSV。</div>
            <select id="route-select" class="mt-3 w-full px-3 py-3 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:ring-2 focus:ring-emerald-500"></select>
            <div class="grid grid-cols-2 gap-2 mt-3">
              <button onclick="gotoPrevStop()" class="px-3 py-3 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-bold"><i class="fa-solid fa-arrow-up mr-1"></i>上一點</button>
              <button onclick="gotoNextStop()" class="px-3 py-3 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-bold"><i class="fa-solid fa-arrow-down mr-1"></i>下一點</button>
            </div>
            <button onclick="downloadCSV()" class="mt-3 w-full px-3 py-3 rounded-xl bg-emerald-500 hover:bg-emerald-600 text-white font-bold">
              <i class="fa-solid fa-file-csv mr-1"></i>下載最新 CSV
            </button>
            <div class="tiny-note mt-2">座標修改後會自動暫存本機，不用另外按儲存。</div>
            <div class="tiny-note mt-2 flex items-start gap-2 leading-5">
              <i class="fa-solid fa-circle-info text-sky-500 mt-[2px]"></i>
              <span>座標可直接貼上，格式：<span class="font-semibold">25.12345, 121.67890</span>。</span>
            </div>
            <div class="tiny-note mt-1 text-slate-500 leading-5 pl-5">
              Google 地圖搜尋地址或景點後，在正確位置<strong>按右鍵</strong>（手機<strong>長按</strong>）→ 點一下跳出的經緯度即可複製，再貼回欄位。
            </div>
          </div>
        </div>
        <div id="admin-stop-list" class="flex-1 overflow-y-auto p-3"></div>
      </section>
    </aside>

    <main id="map-wrap">
      <div id="map"></div>

      <div id="toast" class="hidden absolute top-4 left-1/2 -translate-x-1/2 z-[1500] px-4 py-2 rounded-full bg-slate-900/90 text-white text-sm shadow-lg"></div>

      <div id="user-info" class="">
        <div class="bg-gradient-to-r from-blue-600 to-blue-400 text-white p-4 flex items-start justify-between gap-4">
          <div>
            <div id="panel-title" class="text-lg font-bold">請選擇路線</div>
            <div id="panel-subtitle" class="text-xs opacity-90 mt-1">點左側路線即可顯示</div>
          </div>
          <button onclick="closeUserInfo()" class="hover:text-blue-100"><i class="fa-solid fa-xmark text-lg"></i></button>
        </div>
        <div id="stops-container" class="p-4 overflow-y-auto bg-white"></div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const SCHOOL_COORD = [25.135329910295223, 121.73411787394417];

      { id: "D", name: "丁車", region: "信義、仁愛區", stops: [["培德高職對面站牌",25.1250,121.7650],["孝東路站牌",25.1270,121.7690],["愛買對面",25.1300,121.7710],["深美國小7-11",25.1320,121.7750],["深澳坑路6巷站牌",25.1340,121.7780],["美的世界(深美藥局)",25.1330,121.7820],["大香港對面站牌",25.1300,121.7800],["翠峰山莊",25.1270,121.7760],["信義大街",25.1260,121.7720],["土地公廟",25.1250,121.7680],["光華國宅對面(阿忠檳榔)",25.1230,121.7450],["學校",25.135329910295223,121.73411787394417]] },
      { id: "E", name: "戊車", region: "七堵、仁愛區", stops: [["百福消防局",25.0830,121.6980],["福五街7-11",25.0850,121.7000],["全聯",25.0870,121.7020],["百三街7-11",25.0890,121.7050],["明德二路幸福人生",25.0920,121.7080],["陽明海運",25.0950,121.7120],["七堵郵局",25.0970,121.7150],["泰安診所",25.0990,121.7180],["阿忠檳榔",25.1050,121.7250],["八堵橋頭全家",25.1080,121.7280],["上好汽車借款",25.1120,121.7320],["南榮黃昏市場對面",25.1150,121.7350],["南榮路OK店",25.1180,121.7380],["南榮國小",25.1200,121.7400],["南榮路7-11",25.1230,121.7410],["南榮郵局對面",25.1260,121.7420],["天仁茗茶",25.1280,121.7430],["學校",25.135329910295223,121.73411787394417]] },

      { id: "G", name: "庚車", region: "汐止區", stops: [["樟樹灣(第一銀行前)",25.0610,121.6350],["中興路口(五金行前)",25.0630,121.6400],["樟樹一路路口",25.0650,121.6450],["中國信託",25.0660,121.6500],["消防隊對面",25.0680,121.6550],["汐止火車站旁公園",25.0685,121.6610],["行政中心對面",25.0670,121.6660],["汐止農會前",25.0690,121.6700],["連興路路口(屈臣氏)",25.0720,121.6750],["學校",25.135329910295223,121.73411787394417]] },

    ];

    const map = L.map('map', { zoomControl: false, tap: true }).setView(SCHOOL_COORD, 13);
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19, minZoom: 10 }).addTo(map);

    const schoolIcon = L.divIcon({
      html: '<div style="background-color:#ef4444;color:white;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:3px solid white;box-shadow:0 4px 8px rgba(0,0,0,.28);"><i class="fa-solid fa-school"></i></div>',
      className: '', iconSize: [38,38], iconAnchor: [19,19]
    });
    L.marker(SCHOOL_COORD, { icon: schoolIcon }).addTo(map).bindPopup("<b>🏫 輔大聖心高中</b><br>終點站");

    let ROUTES_DATA = loadRoutes();
    let activeMode = 'user';
    let currentUserRouteId = null;
    let currentAdminRouteId = null;
    let currentAdminStopIndex = 0;
    let adminMarker = null;
    let routeLayer = L.featureGroup().addTo(map);

    const routeList = document.getElementById('route-list');
    const searchInput = document.getElementById('search-input');
    const routeSelect = document.getElementById('route-select');
    const adminStopList = document.getElementById('admin-stop-list');
    const toast = document.getElementById('toast');

    function deepCopy(v) { return JSON.parse(JSON.stringify(v)); }

    function loadRoutes() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) return JSON.parse(saved);
      } catch(e) {}
      return deepCopy(DEFAULT_ROUTES);
    }

    function saveRoutes() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(ROUTES_DATA));
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.remove('hidden');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.add('hidden'), 1800);
    }

    function toggleSidebar(force) {
      if (typeof force === 'boolean') {
        document.body.classList.toggle('sidebar-collapsed', force);
      } else {
        document.body.classList.toggle('sidebar-collapsed');
      }
      setTimeout(() => map.invalidateSize(), 280);
    }

    function switchMode(mode) {
      activeMode = mode;
      document.getElementById('userModeBtn').className = mode === 'user'
        ? 'px-3 py-2 rounded-xl bg-blue-600 text-sm font-bold'
        : 'px-3 py-2 rounded-xl bg-slate-700 text-sm font-bold';
      document.getElementById('adminModeBtn').className = mode === 'admin'
        ? 'px-3 py-2 rounded-xl bg-emerald-600 text-sm font-bold'
        : 'px-3 py-2 rounded-xl bg-slate-700 text-sm font-bold';
      document.getElementById('userSection').classList.toggle('hidden', mode !== 'user');
      document.getElementById('adminSection').classList.toggle('hidden', mode !== 'admin');
      document.getElementById('adminSection').classList.toggle('flex', mode === 'admin');
      document.getElementById('userSection').classList.toggle('flex', mode === 'user');
      closeUserInfo();
      clearAdminMarker();
      routeLayer.clearLayers();
      if (mode === 'user') {
        renderSidebar(searchInput.value.trim());
      } else {
        renderAdminSelect();
        if (!currentAdminRouteId) routeSelect.value = '';
      }
      if (window.innerWidth <= 768) toggleSidebar(false);
    }

    function renderSidebar(filterText = '') {
      routeList.innerHTML = '';
      let hasResult = false;
      ROUTES_DATA.forEach(route => {
        const routeMatch = route.name.includes(filterText) || route.region.includes(filterText);
        const stopMatch = route.stops.some(s => s[0].includes(filterText));
        if (filterText && !routeMatch && !stopMatch) return;
        hasResult = true;
        const btn = document.createElement('button');
        btn.className = 'route-btn' + (currentUserRouteId === route.id ? ' active' : '');
        btn.innerHTML = `
          <div class="flex justify-between items-center">
            <span class="font-bold text-slate-800">${route.name}</span>
            <span class="text-xs text-blue-600 bg-blue-100 px-2 py-1 rounded-full">${route.stops.length} 站</span>
          </div>
          <div class="text-xs text-slate-500"><i class="fa-solid fa-map-location-dot mr-1"></i>${route.region}</div>
        `;
        btn.onclick = () => {
          currentUserRouteId = route.id;
          renderSidebar(filterText);
          drawUserRoute(route.id);
          if (window.innerWidth <= 768) toggleSidebar(true);
        };
        routeList.appendChild(btn);
      });
      if (!hasResult) routeList.innerHTML = '<div class="p-8 text-center text-slate-400">找不到符合的路線</div>';
    }

    function drawUserRoute(routeId) {
      const route = ROUTES_DATA.find(r => r.id === routeId);
      if (!route) return;
      routeLayer.clearLayers();
      const latlngs = route.stops.map(s => [s[1], s[2]]);
      const polyline = L.polyline(latlngs, { color:'#2563eb', weight:5, opacity:.82, lineJoin:'round' }).addTo(routeLayer);
      route.stops.forEach((stop, idx) => {
        if (idx < route.stops.length - 1) {
          L.circleMarker([stop[1], stop[2]], {
            radius:6, color:'#fff', weight:2, fillColor:'#f59e0b', fillOpacity:1
          }).bindPopup(`<b>${idx + 1}. ${stop[0]}</b>`).addTo(routeLayer);
        }
      });
      map.fitBounds(polyline.getBounds(), { padding:[40,40], maxZoom:15 });
      document.getElementById('panel-title').textContent = route.name;
      document.getElementById('panel-subtitle').textContent = route.region;
      document.getElementById('stops-container').innerHTML = '<div class="pt-1">' + route.stops.map((stop, idx) => {
        const isLast = idx === route.stops.length - 1;
        return `<div class="timeline-item ${isLast ? 'destination' : ''}"><div class="text-[15px] ${isLast ? 'font-bold text-red-600' : 'text-slate-700'}">${stop[0]}</div></div>`;
      }).join('') + '</div>';
      document.getElementById('user-info').classList.add('show');
    }

    function closeUserInfo() {
      document.getElementById('user-info').classList.remove('show');
    }

    function renderAdminSelect() {
      routeSelect.innerHTML = '<option value="">請選擇要維修的路線</option>' + ROUTES_DATA.map(r => `<option value="${r.id}">${r.name}｜${r.region}</option>`).join('');
      if (currentAdminRouteId) routeSelect.value = currentAdminRouteId;
      renderAdminStops();
    }

    function renderAdminStops() {
      adminStopList.innerHTML = '';
      routeLayer.clearLayers();
      clearAdminMarker();
      if (!currentAdminRouteId) {
        adminStopList.innerHTML = '<div class="p-6 text-center text-slate-400">請先選擇路線</div>';
        map.flyTo(SCHOOL_COORD, 13);
        return;
      }
      const route = ROUTES_DATA.find(r => r.id === currentAdminRouteId);
      const latlngs = route.stops.map(s => [s[1], s[2]]);
      const polyline = L.polyline(latlngs, { color:'#64748b', weight:4, opacity:.85 }).addTo(routeLayer);
      route.stops.forEach((stop, idx) => {
        const isSchool = idx === route.stops.length - 1;
        const marker = L.circleMarker([stop[1], stop[2]], {
          radius: isSchool ? 0 : 6,
          color:'#fff', weight:2, fillColor: idx === currentAdminStopIndex ? '#2563eb' : '#f59e0b', fillOpacity:1
        });
        if (!isSchool) marker.addTo(routeLayer).bindPopup(`<b>${idx + 1}. ${stop[0]}</b>`);
      });
      map.fitBounds(polyline.getBounds(), { padding:[40,40], maxZoom:15 });

      route.stops.forEach((stop, idx) => {
        const isSchool = idx === route.stops.length - 1;
        const card = document.createElement('div');
        card.className = 'stop-card' + (idx === currentAdminStopIndex ? ' active' : '') + (isSchool ? ' opacity-60 cursor-not-allowed' : '');
        card.innerHTML = `
          <div class="flex items-center justify-between gap-3">
            <div>
              <div class="font-bold text-slate-800">${idx + 1}. ${stop[0]}</div>
              <div class="tiny-note mt-1">${isSchool ? '終點站固定，不需調整' : '點此定位，拖曳地圖上的大頭針修正'}</div>
            </div>
            ${!isSchool && idx === currentAdminStopIndex ? '<span class="text-[11px] px-2 py-1 rounded-full bg-blue-100 text-blue-700 font-bold">目前編輯</span>' : ''}
          </div>
          <input ${isSchool ? 'disabled' : ''} id="coord-${idx}" class="coord-input mt-3" value="${stop[1].toFixed(6)}, ${stop[2].toFixed(6)}" />
        `;
        if (!isSchool) {
          card.onclick = () => activateStop(idx);
          const input = card.querySelector('input');
          input.onclick = (e) => e.stopPropagation();
          input.addEventListener('change', (e) => updateFromInput(idx, e.target.value));
        }
        adminStopList.appendChild(card);
      });
      if (currentAdminStopIndex >= route.stops.length - 1) currentAdminStopIndex = Math.max(0, route.stops.length - 2);
      activateStop(currentAdminStopIndex, false);
    }

    function activateStop(idx, pan = true) {
      const route = ROUTES_DATA.find(r => r.id === currentAdminRouteId);
      if (!route || idx < 0 || idx >= route.stops.length - 1) return;
      currentAdminStopIndex = idx;
      [...adminStopList.querySelectorAll('.stop-card')].forEach((card, i) => card.classList.toggle('active', i === idx));
      clearAdminMarker();
      const stop = route.stops[idx];
      adminMarker = L.marker([stop[1], stop[2]], { draggable:true }).addTo(routeLayer).bindPopup(`<b>${stop[0]}</b><br>拖曳即可修正`).openPopup();
      if (pan) map.setView([stop[1], stop[2]], 16);
      adminMarker.on('drag', () => {
        const p = adminMarker.getLatLng();
        const input = document.getElementById(`coord-${idx}`);
        if (input) input.value = `${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}`;
      });
      adminMarker.on('dragend', () => {
        const p = adminMarker.getLatLng();
        route.stops[idx][1] = Number(p.lat.toFixed(6));
        route.stops[idx][2] = Number(p.lng.toFixed(6));
        saveRoutes();
        renderAdminStops();
        showToast('已更新站點座標');
      });
    }

    function clearAdminMarker() {
      if (adminMarker) {
        routeLayer.removeLayer(adminMarker);
        adminMarker = null;
      }
    }

    function updateFromInput(idx, value) {
      const route = ROUTES_DATA.find(r => r.id === currentAdminRouteId);
      if (!route) return;
      const parts = value.split(',').map(v => v.trim());
      if (parts.length !== 2 || isNaN(parts[0]) || isNaN(parts[1])) {
        showToast('請輸入正確格式：緯度, 經度');
        const stop = route.stops[idx];
        document.getElementById(`coord-${idx}`).value = `${stop[1].toFixed(6)}, ${stop[2].toFixed(6)}`;
        return;
      }
      route.stops[idx][1] = Number(parseFloat(parts[0]).toFixed(6));
      route.stops[idx][2] = Number(parseFloat(parts[1]).toFixed(6));
      saveRoutes();
      renderAdminStops();
      activateStop(idx);
      showToast('已套用手動座標');
    }

    function gotoPrevStop() {
      const route = ROUTES_DATA.find(r => r.id === currentAdminRouteId);
      if (!route) return showToast('請先選一條路線');
      currentAdminStopIndex = Math.max(0, currentAdminStopIndex - 1);
      activateStop(currentAdminStopIndex);
    }

    function gotoNextStop() {
      const route = ROUTES_DATA.find(r => r.id === currentAdminRouteId);
      if (!route) return showToast('請先選一條路線');
      currentAdminStopIndex = Math.min(route.stops.length - 2, currentAdminStopIndex + 1);
      activateStop(currentAdminStopIndex);
    }

    function downloadCSV() {
      const rows = [['路線編號','路線名稱','行駛區域','站牌順序','站牌名稱','緯度','經度']];
      ROUTES_DATA.forEach(route => {
        route.stops.forEach((stop, idx) => rows.push([route.id, route.name, route.region, idx + 1, stop[0], stop[1], stop[2]]));
      });
      const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = '聖心校車路線最新座標.csv';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(a.href);
      showToast('CSV 已下載');
    }

    routeSelect.addEventListener('change', (e) => {
      currentAdminRouteId = e.target.value || null;
      currentAdminStopIndex = 0;
      renderAdminStops();
    });

    searchInput.addEventListener('input', e => renderSidebar(e.target.value.trim()));

    window.addEventListener('resize', () => setTimeout(() => map.invalidateSize(), 200));

    renderSidebar();
    switchMode('user');
    if (window.innerWidth > 768) document.body.classList.remove('sidebar-collapsed');
  </script>
</body>
</html>
