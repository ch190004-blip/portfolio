  <style>
    :root {
      --bg: #eef3fb;
      --panel: rgba(255,255,255,.95);
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbe4f0;
      --shadow: 0 14px 36px rgba(15,23,42,.12);
      --topbar-h: 68px;
      --sidebar-w: 332px;
      --active: #005BFF;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Noto Sans TC', system-ui, sans-serif; background: var(--bg); color: var(--text); }
    body { display: flex; flex-direction: column; }
    button { font: inherit; }
    .topbar {
      height: var(--topbar-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      background: linear-gradient(135deg, #0b1327 0%, #16233f 100%);
      color: white;
      box-shadow: 0 10px 28px rgba(11,19,39,.24);
      z-index: 1000;
    }
    .brand { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .brand-icon {
      width: 44px; height: 44px; border-radius: 14px;
      display: grid; place-items: center;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      font-size: 22px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.28);
      flex-shrink: 0;
    }
    .brand-title { font-size: 21px; font-weight: 900; letter-spacing: .02em; }
    .brand-sub { font-size: 12px; opacity: .82; margin-top: 2px; }
    .top-pill {
      padding: 10px 14px; border-radius: 999px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.16);
      font-size: 12px; font-weight: 800;
      white-space: nowrap;
    }

    #app { flex: 1; min-height: 0; display: flex; position: relative; }
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: rgba(247,250,255,.96);
      backdrop-filter: blur(18px);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 900;
      transition: transform .26s ease;
    }
    #map-wrap { flex: 1; min-width: 0; position: relative; }
    #map { width: 100%; height: 100%; }
    #edgeToggle {
      position: absolute;
      left: calc(var(--sidebar-w) - 12px);
      top: 50%;
      transform: translateY(-50%);
      z-index: 980;
      width: 26px;
      height: 78px;
      border-radius: 0 14px 14px 0;
      border: 1px solid var(--border);
      border-left: none;
      background: white;
      box-shadow: 8px 0 24px rgba(15,23,42,.12);
      cursor: pointer;
      color: #334155;
      font-size: 18px;
      font-weight: 900;
    }
    body.sidebar-collapsed #sidebar { transform: translateX(-100%); }
    body.sidebar-collapsed #edgeToggle { left: 8px; }
    body.sidebar-collapsed #edgeToggle .arrow { transform: rotate(180deg); }
    #edgeToggle .arrow { display: inline-block; transition: transform .2s ease; }

    .sidebar-scroll { flex: 1; overflow: auto; padding: 16px 14px 22px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: 0 8px 20px rgba(15,23,42,.05);
      overflow: hidden;
    }
    .section-title {
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .08em;
      color: #334155;
      margin: 0 0 10px 2px;
    }
    .route-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .route-btn {
      position: relative;
      border: 1px solid var(--border);
      background: white;
      border-radius: 18px;
      padding: 12px 12px 10px;
      text-align: left;
      cursor: pointer;
      transition: .18s ease;
      overflow: hidden;
    }
    .route-btn::before {
      content: '';
      position: absolute;
      inset: 0 auto 0 0;
      width: 7px;
      background: var(--color);
    }
    .route-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(15,23,42,.08);
      border-color: color-mix(in srgb, var(--color) 30%, white);
    }
    .route-btn.active {
      background: linear-gradient(135deg, color-mix(in srgb, var(--color) 18%, white), white 65%);
      border-color: var(--color);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--color) 18%, white), 0 14px 24px rgba(15,23,42,.10);
    }
    .route-btn.active .route-btn-name,
    .route-btn.active .route-btn-meta { color: #0f172a; }
    .route-btn-name { font-size: 18px; font-weight: 900; line-height: 1; padding-left: 10px; }
    .route-btn-meta { font-size: 11px; color: var(--muted); padding-left: 10px; margin-top: 7px; line-height: 1.4; }
    .route-btn-count {
      position: absolute; right: 10px; top: 10px;
      padding: 5px 8px; border-radius: 999px;
      background: var(--color); color: white;
      font-size: 11px; font-weight: 900;
    }

    .summary-card {
      margin-top: 14px;
      padding: 16px 16px 14px;
      border-radius: 22px;
      color: white;
      background: linear-gradient(135deg, var(--active), color-mix(in srgb, var(--active) 68%, white));
      box-shadow: 0 14px 26px color-mix(in srgb, var(--active) 24%, rgba(15,23,42,.12));
    }
    .summary-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }
    .summary-name { font-size: 26px; font-weight: 900; line-height: 1; }
    .summary-region { font-size: 13px; opacity: .93; margin-top: 8px; }
    .summary-chip {
      padding: 7px 10px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.15);
      font-size: 12px; font-weight: 800;
      white-space: nowrap;
    }
    .summary-meta {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px;
    }
    .summary-meta span {
      padding: 7px 10px; border-radius: 999px;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.14);
      font-size: 12px; font-weight: 800;
    }

    .status-card {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.96);
      color: #334155;
      font-size: 12px;
      line-height: 1.6;
    }
    .status-card strong { color: #0f172a; }
    .status-dot {
      display: inline-block;
      width: 9px; height: 9px; border-radius: 999px;
      background: #f59e0b; margin-right: 6px;
      vertical-align: middle;
    }
    .status-dot.ok { background: #10b981; }

    .stops-panel { margin-top: 14px; }
    .stops-head {
      padding: 16px 16px 14px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(248,250,255,.92));
    }
    .stops-head-title { font-size: 16px; font-weight: 900; }
    .stops-head-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .stops-list {
      padding: 12px 10px 14px;
      max-height: 50vh;
      overflow: auto;
      background: rgba(255,255,255,.94);
    }
    .stop-item {
      position: relative;
      display: block;
      width: 100%;
      border: none;
      background: transparent;
      padding: 10px 10px 10px 38px;
      text-align: left;
      border-radius: 16px;
      cursor: pointer;
      transition: .16s ease;
    }
    .stop-item:hover {
      background: color-mix(in srgb, var(--active) 8%, white);
    }
    .stop-item.active {
      background: color-mix(in srgb, var(--active) 12%, white);
    }
    .stop-dot {
      position: absolute;
      left: 10px; top: 10px;
      width: 20px; height: 20px; border-radius: 999px;
      background: var(--active);
      color: white;
      display: grid; place-items: center;
      font-size: 10px; font-weight: 900;
      box-shadow: 0 0 0 4px white;
    }
    .stop-item.school .stop-dot { background: #e11d48; }
    .stop-name { font-size: 14px; font-weight: 800; color: #0f172a; line-height: 1.35; }
    .stop-coord { margin-top: 4px; font-size: 11px; color: #64748b; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .stop-item.active .stop-name { color: var(--active); }

    .map-hint {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 700;
      background: rgba(255,255,255,.94);
      border: 1px solid rgba(226,232,240,.95);
      border-radius: 18px;
      padding: 14px 16px;
      box-shadow: 0 12px 26px rgba(15,23,42,.10);
      max-width: min(400px, calc(100vw - 32px));
    }
    .map-hint-title { font-size: 14px; font-weight: 900; }
    .map-hint-sub { font-size: 12px; color: var(--muted); line-height: 1.6; margin-top: 6px; }

    .leaflet-control-zoom {
      border: none !important;
      box-shadow: 0 10px 24px rgba(15,23,42,.14);
      overflow: hidden;
      border-radius: 16px;
    }
    .leaflet-control-zoom a {
      width: 38px !important;
      height: 38px !important;
      line-height: 38px !important;
      font-size: 18px !important;
    }
    .leaflet-popup-content-wrapper {
      border-radius: 18px;
      box-shadow: 0 14px 34px rgba(15,23,42,.18);
    }
    .leaflet-popup-content { margin: 14px 16px; min-width: 200px; }
    .stop-popup-title { font-size: 15px; font-weight: 900; color: #0f172a; }
    .stop-popup-sub { margin-top: 6px; font-size: 12px; color: #64748b; line-height: 1.6; }
    .leaflet-control-attribution { font-size: 11px; }

    @media (max-width: 900px) {
      :root { --sidebar-w: min(88vw, 340px); }
      #sidebar {
        position: absolute; left: 0; top: 0; bottom: 0;
        box-shadow: 14px 0 30px rgba(15,23,42,.16);
      }
      .brand-title { font-size: 18px; }
      .brand-sub { display: none; }
      .top-pill { display: none; }
      .map-hint { top: 12px; left: 12px; right: 12px; max-width: none; }
      .stops-list { max-height: 44vh; }
    }
  </style>
</head>

      </div>
    </main>
  </div>

    const routeGrid = document.getElementById('routeGrid');
    const summaryCard = document.getElementById('summaryCard');
    const summaryName = document.getElementById('summaryName');
    const summaryRegion = document.getElementById('summaryRegion');
    const summaryBadge = document.getElementById('summaryBadge');
    const summaryMeta = document.getElementById('summaryMeta');
    const topPill = document.getElementById('topPill');
    const stopsList = document.getElementById('stopsList');
    const statusText = document.getElementById('statusText');
    const statusSub = document.getElementById('statusSub');
    const statusDot = document.getElementById('statusDot');
    const edgeToggle = document.getElementById('edgeToggle');

    const map = L.map('map', {
      zoomControl: true,
      preferCanvas: true
    }).setView([25.13533, 121.734118], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap 貢獻者'
    }).addTo(map);

    function rgba(hex, alpha) {
      const c = hex.replace('#', '');
      const bigint = parseInt(c, 16);
      const r = (bigint >> 16) & 255;
      const g = (bigint >> 8) & 255;
      const b = bigint & 255;
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function createStopIcon(color, label) {
      return L.divIcon({
        className: '',
        iconSize: [34, 34],
        iconAnchor: [17, 17],
        html: `
          <div style="
            width:34px;height:34px;border-radius:50%;
            background:${color};
            color:#fff;
            display:grid;place-items:center;
            font-weight:900;font-size:12px;
            border:3px solid #fff;
            box-shadow:0 8px 18px rgba(15,23,42,.24);">
            ${label}
          </div>
        `
      });
    }

    const schoolIcon = L.divIcon({
      className: '',
      iconSize: [44, 44],
      iconAnchor: [22, 22],
      html: `
        <div style="
          width:44px;height:44px;border-radius:50%;
          display:grid;place-items:center;
          background:linear-gradient(135deg,#ef4444,#e11d48);
          color:#fff;font-size:20px;
          border:3px solid #fff;
          box-shadow:0 12px 22px rgba(15,23,42,.25);">🏫</div>
      `
    });

    const schoolMarker = L.marker([SCHOOL.lat, SCHOOL.lng], { icon: schoolIcon, zIndexOffset: 4000 })
      .bindPopup(`<div class="stop-popup-title">🏫 ${SCHOOL.name}</div><div class="stop-popup-sub">所有路線的最終到達站</div>`);

    let activeRouteId = ROUTES[0].id;
    let activeStopOrder = null;
    let activeLayers = [];
    let routeStates = new Map();

    function fetchRoadGeometry(stops) {
      const coordString = stops.map(stop => `${stop.lng},${stop.lat}`).join(';');
      const url = `https://router.project-osrm.org/route/v1/driving/${coordString}?overview=full&geometries=geojson&continue_straight=true&steps=false`;
      return fetch(url)
        .then(r => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.json();
        })
        .then(data => {
          if (data.code !== 'Ok' || !data.routes || !data.routes.length) throw new Error('route not found');
          return data.routes[0].geometry.coordinates.map(([lng, lat]) => [lat, lng]);
        });
    }

    function createState(route) {
      const state = {
        route,
        roadReady: false,
        failed: false,
        latlngs: route.stops.map(s => [s.lat, s.lng]),
        roadPromise: null,
        layersReady: false,
        glow: null,
        casing: null,
        line: null,
        markers: L.layerGroup()
      };

      route.stops.forEach((stop, idx) => {
        const isSchool = idx === route.stops.length - 1;
        if (isSchool) return;
        const marker = L.marker([stop.lat, stop.lng], {
          icon: createStopIcon(route.color, stop.order),
          keyboard: false,
          zIndexOffset: 2000 + stop.order
        }).bindPopup(`
          <div class="stop-popup-title">${route.name}｜${stop.order}. ${stop.name}</div>
          <div class="stop-popup-sub">${route.region}<br>緯度 ${stop.lat.toFixed(6)} ｜ 經度 ${stop.lng.toFixed(6)}</div>
        `);
        marker.on('click', () => {
          activeRouteId = route.id;
          activeStopOrder = stop.order;
          renderAll();
          marker.openPopup();
        });
        state.markers.addLayer(marker);
      });

      state.glow = L.polyline(state.latlngs, {
        color: rgba(route.color, 0.24),
        weight: 18,
        opacity: 1,
        lineCap: 'round',
        lineJoin: 'round'
      });
      state.casing = L.polyline(state.latlngs, {
        color: 'rgba(255,255,255,.96)',
        weight: 11,
        opacity: .96,
        lineCap: 'round',
        lineJoin: 'round'
      });
      state.line = L.polyline(state.latlngs, {
        color: route.color,
        weight: 7,
        opacity: .98,
        lineCap: 'round',
        lineJoin: 'round'
      });
      state.line.on('click', () => {
        activeRouteId = route.id;
        renderAll();
      });
      state.casing.on('click', () => {
        activeRouteId = route.id;
        renderAll();
      });

      return state;
    }

    function fitActiveRoute() {
      const state = routeStates.get(activeRouteId);
      if (!state) return;
      const bounds = state.line.getBounds();
      if (bounds.isValid()) {
        map.fitBounds(bounds, { padding: [46, 46], maxZoom: 14 });
      }
    }

    function removeActiveLayers() {
      activeLayers.forEach(layer => {
        if (map.hasLayer(layer)) map.removeLayer(layer);
      });
      activeLayers = [];
    }

    function showRouteOnMap(routeId) {
      removeActiveLayers();
      const state = routeStates.get(routeId);
      if (!state) return;
      activeLayers = [state.glow, state.casing, state.line, state.markers, schoolMarker];
      activeLayers.forEach(layer => {
        if (!map.hasLayer(layer)) layer.addTo(map);
      });
      state.glow.bringToBack();
      state.casing.bringToFront();
      state.line.bringToFront();
      schoolMarker.bringToFront();
      fitActiveRoute();
    }

    function renderRouteButtons() {
      routeGrid.innerHTML = ROUTES.map(route => {
        const state = routeStates.get(route.id);
        const readyText = state?.roadReady ? '沿道路' : state?.failed ? '直線備援' : '載入中';
        return `
          <button class="route-btn ${activeRouteId === route.id ? 'active' : ''}" style="--color:${route.color}" data-route-id="${route.id}">
            <div class="route-btn-count">${route.stops.length - 1}站</div>
            <div class="route-btn-name">${route.name}</div>
            <div class="route-btn-meta">${route.region}<br>${readyText}</div>
          </button>
        `;
      }).join('');
            routeGrid.querySelectorAll('.route-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          activeRouteId = btn.dataset.routeId;
          activeStopOrder = null;
          renderAll();
          if (window.innerWidth <= 900) {
            document.body.classList.add('sidebar-collapsed');
            setTimeout(() => map.invalidateSize(), 260);
          }
        });
      });
    }

    function renderSummary() {
      const route = ROUTES.find(r => r.id === activeRouteId);
      const state = routeStates.get(activeRouteId);
      document.documentElement.style.setProperty('--active', route.color);
      summaryCard.style.background = `linear-gradient(135deg, ${route.color}, color-mix(in srgb, ${route.color} 68%, white))`;
      summaryName.textContent = route.name;
      summaryRegion.textContent = route.region;
      summaryBadge.textContent = state.roadReady ? '沿道路完成' : state.failed ? '直線備援' : '道路載入中';
      summaryMeta.innerHTML = `
        <span>${route.stops.length - 1} 個上車站</span>
        <span>${route.stops.filter(s => s.confirmed).length} 站已確認</span>
        <span>終點：學校</span>
      `;
      topPill.textContent = `目前顯示：${route.name}`;
      statusText.textContent = state.roadReady ? `${route.name} 已沿道路顯示` : state.failed ? `${route.name} 目前為直線備援` : `${route.name} 道路路線載入中`;
      statusSub.textContent = state.roadReady
        ? '這條路線已切換成沿道路的版本。'
        : state.failed
          ? '這條線暫時抓不到道路資料，所以先用站點直線顯示。'
          : '若資料稍慢，地圖會先用站點直線顯示，稍後自動更新。';
      statusDot.className = 'status-dot' + (state.roadReady ? ' ok' : '');
    }

    function renderStops() {
      const route = ROUTES.find(r => r.id === activeRouteId);
      stopsList.innerHTML = route.stops.map((stop, idx) => {
        const isSchool = idx === route.stops.length - 1;
        const label = isSchool ? '校' : stop.order;
        const active = activeStopOrder === stop.order;
        return `
          <button class="stop-item ${isSchool ? 'school' : ''} ${active ? 'active' : ''}" data-order="${stop.order}">
            <span class="stop-dot">${label}</span>
            <div class="stop-name">${stop.name}</div>
            <div class="stop-coord">${Number(stop.lat).toFixed(6)}, ${Number(stop.lng).toFixed(6)}</div>
          </button>
        `;
      }).join('');
      stopsList.querySelectorAll('.stop-item').forEach(btn => {
        btn.addEventListener('click', () => {
          const route = ROUTES.find(r => r.id === activeRouteId);
          const order = Number(btn.dataset.order);
          const stop = route.stops.find(s => s.order === order);
          if (!stop) return;
          activeStopOrder = order;
          renderStops();
          if (stop.name === '學校') {
            map.flyTo([SCHOOL.lat, SCHOOL.lng], Math.max(map.getZoom(), 16), { duration: .6 });
            schoolMarker.openPopup();
            return;
          }
          map.flyTo([stop.lat, stop.lng], Math.max(map.getZoom(), 16), { duration: .6 });
          const state = routeStates.get(activeRouteId);
          state.markers.eachLayer(layer => {
            const ll = layer.getLatLng();
            if (Math.abs(ll.lat - stop.lat) < 1e-6 && Math.abs(ll.lng - stop.lng) < 1e-6) {
              layer.openPopup();
            }
          });
        });
      });
    }

    function renderAll() {
      renderRouteButtons();
      renderSummary();
      renderStops();
      showRouteOnMap(activeRouteId);
    }

    function startBackgroundRouting() {
      ROUTES.forEach(route => {
        const state = routeStates.get(route.id);
        state.roadPromise = fetchRoadGeometry(route.stops)
          .then(latlngs => {
            state.latlngs = latlngs;
            state.roadReady = true;
            state.glow.setLatLngs(latlngs);
            state.casing.setLatLngs(latlngs);
            state.line.setLatLngs(latlngs);
            if (activeRouteId === route.id) {
              renderSummary();
              showRouteOnMap(activeRouteId);
            } else {
              renderRouteButtons();
            }
          })
          .catch(error => {
            console.warn('道路資料抓取失敗，改用直線備援：', route.name, error);
            state.failed = true;
            if (activeRouteId === route.id) renderSummary();
            renderRouteButtons();
          });
      });
    }

    function toggleSidebar() {
      document.body.classList.toggle('sidebar-collapsed');
      setTimeout(() => map.invalidateSize(), 260);
    }

    function init() {
      ROUTES.forEach(route => routeStates.set(route.id, createState(route)));
      renderAll();
      startBackgroundRouting();
      setTimeout(() => map.invalidateSize(), 180);
      if (window.innerWidth <= 900) {
        document.body.classList.add('sidebar-collapsed');
      }
    }

    edgeToggle.addEventListener('click', toggleSidebar);
    window.addEventListener('resize', () => setTimeout(() => map.invalidateSize(), 220));
    init();
  </script>
</body>
</html>
