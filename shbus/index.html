  <style>
    :root {
      --bg:#edf3fb;
      --panel:rgba(255,255,255,.96);
      --text:#0f172a;
      --muted:#64748b;
      --border:#dbe4f0;
      --shadow:0 14px 36px rgba(15,23,42,.12);
      --topbar-h:64px;
      --sidebar-w:330px;
      --active:#005BFF;
    }
    * { box-sizing:border-box; }
    html,body { margin:0; width:100%; height:100%; overflow:hidden; font-family:'Noto Sans TC',system-ui,sans-serif; background:var(--bg); color:var(--text); }
    body { display:flex; flex-direction:column; }
    button { font:inherit; }
    .topbar {
      height:var(--topbar-h); display:flex; align-items:center; justify-content:space-between;
      padding:0 16px 0 18px; color:#fff; background:linear-gradient(135deg,#081225 0%,#16233f 100%);
      box-shadow:0 10px 28px rgba(11,19,39,.22); z-index:1000;
    }
    .brand { display:flex; align-items:center; gap:12px; min-width:0; }
    .brand-icon { width:42px; height:42px; border-radius:14px; display:grid; place-items:center; flex-shrink:0; font-size:21px; background:linear-gradient(135deg,#3b82f6,#2563eb); }
    .brand-title { font-size:20px; font-weight:900; letter-spacing:.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .route-pill { padding:9px 12px; border-radius:999px; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.14); font-size:12px; font-weight:800; white-space:nowrap; }
    #app { flex:1; min-height:0; display:flex; position:relative; }
    #sidebar { width:var(--sidebar-w); min-width:var(--sidebar-w); background:rgba(247,250,255,.96); border-right:1px solid var(--border); display:flex; flex-direction:column; transition:transform .23s ease; z-index:900; }
    #map-wrap { flex:1; min-width:0; position:relative; }
    #map { width:100%; height:100%; }
    #edgeToggle { position:absolute; left:calc(var(--sidebar-w) - 12px); top:50%; transform:translateY(-50%); z-index:980; width:26px; height:78px; border-radius:0 14px 14px 0; border:1px solid var(--border); border-left:none; background:#fff; box-shadow:8px 0 24px rgba(15,23,42,.12); cursor:pointer; color:#334155; font-size:18px; font-weight:900; }
    body.sidebar-collapsed #sidebar { transform:translateX(-100%); }
    body.sidebar-collapsed #edgeToggle { left:8px; }
    body.sidebar-collapsed #edgeToggle .arrow { transform:rotate(180deg); }
    #edgeToggle .arrow { display:inline-block; transition:transform .2s ease; }
    .sidebar-scroll { flex:1; overflow:auto; padding:16px 14px 20px; }
    .route-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .route-btn { position:relative; border:1px solid var(--border); background:#fff; border-radius:18px; padding:12px 12px 10px; text-align:left; cursor:pointer; transition:transform .14s ease, box-shadow .14s ease, border-color .14s ease; overflow:hidden; }
    .route-btn::before { content:''; position:absolute; inset:0 auto 0 0; width:8px; background:var(--color); }
    .route-btn:hover { transform:translateY(-1px); box-shadow:0 10px 18px rgba(15,23,42,.08); border-color:color-mix(in srgb,var(--color) 26%, white); }

    .route-btn-name { font-size:18px; font-weight:900; line-height:1; padding-left:10px; }

    .route-btn-count { position:absolute; right:10px; top:10px; padding:5px 8px; border-radius:999px; background:var(--color); color:#fff; font-size:11px; font-weight:900; }
    .summary-card { margin-top:14px; padding:16px; border-radius:22px; color:#fff; background:linear-gradient(135deg,var(--active), color-mix(in srgb,var(--active) 68%, white)); box-shadow:0 14px 26px color-mix(in srgb,var(--active) 24%, rgba(15,23,42,.12)); }
    .summary-top { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
    .summary-name { font-size:26px; font-weight:900; line-height:1; }
    .summary-region { font-size:13px; opacity:.95; margin-top:7px; }
    .summary-chip { padding:7px 10px; border-radius:999px; background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.14); font-size:12px; font-weight:900; white-space:nowrap; }
    .summary-meta { display:flex; gap:8px; flex-wrap:wrap; margin-top:13px; }
    .summary-meta span { padding:7px 10px; border-radius:999px; background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.14); font-size:12px; font-weight:800; }
    .panel { margin-top:14px; background:var(--panel); border:1px solid var(--border); border-radius:22px; overflow:hidden; box-shadow:0 8px 20px rgba(15,23,42,.05); }
    .panel-head { padding:15px 16px 13px; border-bottom:1px solid var(--border); background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(248,250,255,.92)); }
    .panel-head-title { font-size:16px; font-weight:900; }
    .stops-list { padding:12px 10px 14px; max-height:52vh; overflow:auto; background:rgba(255,255,255,.95); }

    .stop-item:hover { background:color-mix(in srgb,var(--active) 8%, white); }
    .stop-item.active { background:color-mix(in srgb,var(--active) 12%, white); }
    .stop-dot { position:absolute; left:10px; top:10px; width:20px; height:20px; border-radius:999px; background:var(--active); color:#fff; display:grid; place-items:center; font-size:10px; font-weight:900; box-shadow:0 0 0 4px #fff; }
    .stop-item.school .stop-dot { background:#e11d48; }
    .stop-name { font-size:14px; font-weight:800; color:#0f172a; line-height:1.35; }
    .stop-coord { margin-top:4px; font-size:11px; color:#64748b; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
    .map-tools { position:absolute; right:16px; top:16px; z-index:700; display:flex; gap:8px; }
    .map-tool-btn { padding:10px 12px; border:none; border-radius:14px; background:rgba(255,255,255,.94); box-shadow:0 10px 24px rgba(15,23,42,.12); font-size:12px; font-weight:900; color:#0f172a; cursor:pointer; }
    .leaflet-control-zoom { border:none !important; box-shadow:0 10px 24px rgba(15,23,42,.14); overflow:hidden; border-radius:16px; }
    .leaflet-control-zoom a { width:38px !important; height:38px !important; line-height:38px !important; font-size:18px !important; }
    .leaflet-popup-content-wrapper { border-radius:18px; box-shadow:0 14px 34px rgba(15,23,42,.18); }

    .stop-popup-title { font-size:15px; font-weight:900; color:#0f172a; }

      .brand-title { font-size:18px; }
      .route-pill { display:none; }
      .stops-list { max-height:45vh; }
    }
  </style>

9,"confirmed":true},{"order":13,"name":"暖暖區公所對面","lat":25.100259,"lng":121.736139,"confirmed":true},{"order":14,"name":"八堵國小","lat":25.108561,"lng":121.73278,"confirmed":true},{"order":15,"name":"富景天下","lat":25.116536,"lng":121.72647,"confirmed":true},{"order":16,"name":"學校","lat":25.135329910295223,"lng":121.73411787394417,"confirmed":false}]},{"id":"G","name":"庚車","region":"汐止區","color":"#D946EF","stops":[{"order":1,"name":"樟樹灣(第一銀行前)","lat":25.057423,"lng":121.634419,"confirmed":true},{"order":2,"name":"中興路口(五金行前)","lat":25.059451,"lng":121.638376,"confirmed":true},{"order":3,"name":"樟樹一路路口","lat":25.06097,"lng":121.64238,"confirmed":true},{"order":4,"name":"中國信託","lat":25.065412,"lng":121.653432,"confirmed":true},{"order":5,"name":"消防隊對面","lat":25.063655,"lng":121.657116,"confirmed":true},{"order":6,"name":"汐止火車站旁公園","lat":25.068837,"lng":121.662772,"confirmed":true},{"order":7,"name":"行政中心對面","lat":25.064547,"lng":121.658542,"confirmed":true},{"order":8,"name":"汐止農會前","lat":25.06383,"lng":121.656736,"confirmed":true},{"order":9,"name":"連興路路口(屈臣氏)","lat":25.062693,"lng":121.654128,"confirmed":true},{"order":10,"name":"學校","lat":25.135329910295223,"lng":121.73411787394417,"confirmed":false}]},{"id":"H","name":"辛車","region":"金山、萬里、大武崙","color":"#FFB000","stops":[{"order":1,"name":"金山中正路路口7-11","lat":25.219786,"lng":121.633257,"confirmed":true},{"order":2,"name":"中正路公車站牌","lat":25.221823,"lng":121.634115,"confirmed":true},{"order":3,"name":"金山區公所","lat":25.22232,"lng":121.636648,"confirmed":true},{"order":4,"name":"淡水一信合作社對面","lat":25.220809,"lng":121.638481,"confirmed":true},{"order":5,"name":"郵局(金山站)","lat":25.218989,"lng":121.639972,"confirmed":true},{"order":6,"name":"喜凱亞溫泉酒店","lat":25.215296,"lng":121.643384,"confirmed":true},{"order":7,"name":"頂寮(知味鄉玉米)","lat":25.20914,"lng":121.654891,"confirmed":true},{"order":8,"name":"野柳隧道口","lat":25.201118,"lng":121.67366,"confirmed":true},{"order":9,"name":"野柳農會","lat":25.203219,"lng":121.686559,"confirmed":true},{"order":10,"name":"東方美早餐店","lat":25.203946,"lng":121.68771,"confirmed":true},{"order":11,"name":"翡翠灣","lat":25.187182,"lng":121.68314,"confirmed":true},{"order":12,"name":"東澳公車站","lat":25.203715,"lng":121.691254,"confirmed":true},{"order":13,"name":"龜吼公車站","lat":25.195912,"lng":121.686475,"confirmed":true},{"order":14,"name":"石角公車站","lat":25.192193,"lng":121.684672,"confirmed":true},{"order":15,"name":"美崙公車站","lat":25.184674,"lng":121.685995,"confirmed":true},{"order":16,"name":"萬里區公有市場","lat":25.179607,"lng":121.689336,"confirmed":true},{"order":17,"name":"萬里分駐所","lat":25.178054,"lng":121.689412,"confirmed":true},{"order":18,"name":"萬里國小對面7-11","lat":25.177442,"lng":121.687228,"confirmed":true},{"order":19,"name":"磚廠公車站","lat":25.168935,"lng":121.680417,"confirmed":true},{"order":20,"name":"武聖街口(全家)","lat":25.148473,"lng":121.700176,"confirmed":true},{"order":21,"name":"藍天麗池對面","lat":25.154155,"lng":121.696841,"confirmed":true},{"order":22,"name":"石山公車站牌","lat":25.151982,"lng":121.697686,"confirmed":true},{"order":23,"name":"三層公車站牌","lat":25.143946,"lng":121.702256,"confirmed":true},{"order":24,"name":"武崙國中站牌","lat":25.138271,"lng":121.705764,"confirmed":true},{"order":25,"name":"情人湖路口","lat":25.141801,"lng":121.709895,"confirmed":true},{"order":26,"name":"學校","lat":25.135329910295223,"lng":121.73411787394417,"confirmed":false}]}];
    const ROAD_CACHE_KEY='shbus-road-cache-v4';

    const routeGrid=document.getElementById('routeGrid');
    const stopsList=document.getElementById('stopsList');
    const summaryCard=document.getElementById('summaryCard');
    const summaryName=document.getElementById('summaryName');
    const summaryRegion=document.getElementById('summaryRegion');
    const summaryChip=document.getElementById('summaryChip');
    const summaryMeta=document.getElementById('summaryMeta');
    const topPill=document.getElementById('topPill');
    const edgeToggle=document.getElementById('edgeToggle');
    const focusRouteBtn=document.getElementById('focusRouteBtn');

    const map=L.map('map',{zoomControl:true, preferCanvas:true, zoomSnap:.25}).setView([SCHOOL.lat,SCHOOL.lng],12.75);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap 貢獻者', maxZoom:19}).addTo(map);

    const roadCache=loadRoadCache();
    const routeStates=new Map();
    let activeRouteId=ROUTES[0].id;
    let activeStopOrder=null;
    let activeLayers=[];
    let prefetchQueue=[];

    function loadRoadCache(){ try { return JSON.parse(localStorage.getItem(ROAD_CACHE_KEY) || '{}'); } catch(e) { return {}; } }
    function saveRoadCache(){ try { localStorage.setItem(ROAD_CACHE_KEY, JSON.stringify(roadCache)); } catch(e) {} }
    function cacheKey(route){ return route.id + ':' + route.stops.map(s => `${s.order}:${Number(s.lat).toFixed(6)},${Number(s.lng).toFixed(6)}`).join('|'); }
    function rgba(hex,a){ const c=hex.replace('#',''); const n=parseInt(c,16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }

    function createStopIcon(color,label){
      return L.divIcon({
        className:'', iconSize:[34,34], iconAnchor:[17,17],
        html:`<div style="width:34px;height:34px;border-radius:50%;background:${color};color:#fff;display:grid;place-items:center;font-weight:900;font-size:12px;border:3px solid #fff;box-shadow:0 8px 18px rgba(15,23,42,.24);">${label}</div>`
      });
    }
    const schoolIcon=L.divIcon({
      className:'', iconSize:[44,44], iconAnchor:[22,22],
      html:`<div style="width:44px;height:44px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#ef4444,#e11d48);color:#fff;font-size:20px;border:3px solid #fff;box-shadow:0 12px 22px rgba(15,23,42,.25);">🏫</div>`
    });
    const schoolMarker=L.marker([SCHOOL.lat,SCHOOL.lng],{icon:schoolIcon,zIndexOffset:4000})
      .bindPopup(`<div class="stop-popup-title">🏫 ${SCHOOL.name}</div><div class="stop-popup-sub">所有路線最終到達站</div>`);

    function createState(route){
      const directLatLngs=route.stops.map(s=>[s.lat,s.lng]);
      const state={route,directLatLngs,roadLatLngs:null,fetching:false,fetched:false,failed:false,markers:L.layerGroup(),glow:null,casing:null,line:null};
      route.stops.forEach((stop,idx)=>{
        if (idx===route.stops.length-1) return;
        const marker=L.marker([stop.lat,stop.lng],{icon:createStopIcon(route.color, stop.order),keyboard:false,zIndexOffset:2000+stop.order})
          .bindPopup(`<div class="stop-popup-title">${route.name}｜${stop.order}. ${stop.name}</div><div class="stop-popup-sub">${route.region}<br>緯度 ${Number(stop.lat).toFixed(6)} ｜ 經度 ${Number(stop.lng).toFixed(6)}</div>`);
        marker.on('click',()=>{ activeRouteId=route.id; activeStopOrder=stop.order; renderAll(false); marker.openPopup(); });
        state.markers.addLayer(marker);
      });
      state.glow=L.polyline(directLatLngs,{color:rgba(route.color,.22),weight:20,opacity:1,lineCap:'round',lineJoin:'round'});
      state.casing=L.polyline(directLatLngs,{color:'rgba(255,255,255,.97)',weight:12,opacity:.98,lineCap:'round',lineJoin:'round'});
      state.line=L.polyline(directLatLngs,{color:route.color,weight:8,opacity:.98,lineCap:'round',lineJoin:'round'});
      state.line.on('click',()=>{ activeRouteId=route.id; renderAll(false); });
      state.casing.on('click',()=>{ activeRouteId=route.id; renderAll(false); });
      const cached=roadCache[cacheKey(route)];
      if (cached && Array.isArray(cached) && cached.length>1) {
        state.roadLatLngs=cached;
        state.fetched=true;
        state.glow.setLatLngs(cached); state.casing.setLatLngs(cached); state.line.setLatLngs(cached);
      }
      return state;
    }

    function routeLatLngs(state){ return state.roadLatLngs || state.directLatLngs; }
    function removeActiveLayers(){ activeLayers.forEach(layer=>{ if (map.hasLayer(layer)) map.removeLayer(layer); }); activeLayers=[]; }
    function showRouteOnMap(routeId, fit=true){
      const state=routeStates.get(routeId); if (!state) return;
      removeActiveLayers();
      activeLayers=[state.glow,state.casing,state.line,state.markers,schoolMarker];
      activeLayers.forEach(layer=>{ if (!map.hasLayer(layer)) layer.addTo(map); });
      state.glow.bringToBack(); state.casing.bringToFront(); state.line.bringToFront(); schoolMarker.bringToFront();
      if (fit) focusRoute(routeId);
    }
    function focusRoute(routeId){
      const state=routeStates.get(routeId); if (!state) return;
      const bounds=L.latLngBounds(routeLatLngs(state));
      if (bounds.isValid()) map.flyToBounds(bounds, {padding:[44,44], maxZoom:14.25, duration:.6});
    }

    async function fetchRoadGeometry(route){
      const coords=route.stops.map(s=>`${s.lng},${s.lat}`).join(';');
      const url=`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson&continue_straight=true&steps=false`;
      const res=await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data=await res.json();
      if (data.code!=='Ok' || !data.routes?.length) throw new Error('route not found');
      return data.routes[0].geometry.coordinates.map(([lng,lat])=>[lat,lng]);
    }

    async function ensureRoad(routeId, redraw=false){
      const state=routeStates.get(routeId); if (!state || state.fetched || state.fetching || state.failed) return;
      state.fetching=true;
      try {
        const latlngs=await fetchRoadGeometry(state.route);
        state.roadLatLngs=latlngs; state.fetched=true;
        state.glow.setLatLngs(latlngs); state.casing.setLatLngs(latlngs); state.line.setLatLngs(latlngs);
        roadCache[cacheKey(state.route)]=latlngs; saveRoadCache();
        if (activeRouteId===routeId && redraw) showRouteOnMap(routeId,false);
      } catch(err) {
        console.warn('道路資料抓取失敗，保留站點連線：', state.route.name, err);
        state.failed=true;
      } finally {
        state.fetching=false;
      }
    }

    function queuePrefetchOthers(){
      prefetchQueue = ROUTES.map(r=>r.id).filter(id=>id!==activeRouteId);
      let delay=1200;
      prefetchQueue.forEach(id=>{
        setTimeout(()=>ensureRoad(id,false), delay);
        delay += 900;
      });
    }

    function renderRouteButtons(){
      routeGrid.innerHTML=ROUTES.map(route=>`<button class="route-btn ${activeRouteId===route.id?'active':''}" style="--color:${route.color}" data-route-id="${route.id}"><div class="route-btn-count">${route.stops.length-1}站</div><div class="route-btn-name">${route.name}</div><div class="route-btn-meta">${route.region}</div></button>`).join('');
      routeGrid.querySelectorAll('.route-btn').forEach(btn=>btn.addEventListener('click',()=>selectRoute(btn.dataset.routeId,true)));
    }

    function renderSummary(){
      const route=ROUTES.find(r=>r.id===activeRouteId); const state=routeStates.get(activeRouteId);
      document.documentElement.style.setProperty('--active', route.color);
      summaryCard.style.background=`linear-gradient(135deg, ${route.color}, color-mix(in srgb, ${route.color} 68%, white))`;
      summaryName.textContent=route.name;
      summaryRegion.textContent=route.region;
      summaryChip.textContent=`${route.stops.length-1} 站`;
      summaryMeta.innerHTML=`<span>${route.stops.filter(s=>s.confirmed).length} 站已確認</span><span>終點：學校</span>${state.fetched ? '<span>道路版</span>' : ''}`;
      topPill.textContent=route.name;
    }

    function renderStops(){
      const route=ROUTES.find(r=>r.id===activeRouteId);
      stopsList.innerHTML=route.stops.map((stop,idx)=>{
        const isSchool=idx===route.stops.length-1; const label=isSchool?'校':stop.order; const active=activeStopOrder===stop.order;
        return `<button class="stop-item ${isSchool?'school':''} ${active?'active':''}" data-order="${stop.order}"><span class="stop-dot">${label}</span><div class="stop-name">${stop.name}</div><div class="stop-coord">${Number(stop.lat).toFixed(6)}, ${Number(stop.lng).toFixed(6)}</div></button>`;
      }).join('');
      stopsList.querySelectorAll('.stop-item').forEach(btn=>btn.addEventListener('click',()=>{
        const route=ROUTES.find(r=>r.id===activeRouteId); const order=Number(btn.dataset.order); const stop=route.stops.find(s=>s.order===order); if (!stop) return;
        activeStopOrder=order; renderStops();
        if (stop.name==='學校') { map.flyTo([SCHOOL.lat,SCHOOL.lng], Math.max(map.getZoom(),16), {duration:.45}); schoolMarker.openPopup(); return; }
        map.flyTo([stop.lat,stop.lng], Math.max(map.getZoom(),16.4), {duration:.38});
        const state=routeStates.get(activeRouteId);
        state.markers.eachLayer(layer=>{ const ll=layer.getLatLng(); if (Math.abs(ll.lat-stop.lat)<1e-6 && Math.abs(ll.lng-stop.lng)<1e-6) layer.openPopup(); });
      }));
    }

    function renderAll(fit=true){ renderRouteButtons(); renderSummary(); renderStops(); showRouteOnMap(activeRouteId, fit); }

    function selectRoute(routeId, fit=true){
      activeRouteId=routeId; activeStopOrder=null; renderAll(fit); ensureRoad(routeId,true);
      if (window.innerWidth<=900) { document.body.classList.add('sidebar-collapsed'); setTimeout(()=>map.invalidateSize(),240); }
    }

    function toggleSidebar(){ document.body.classList.toggle('sidebar-collapsed'); setTimeout(()=>map.invalidateSize(),240); }

    edgeToggle.addEventListener('click', toggleSidebar);
    focusRouteBtn.addEventListener('click', ()=>focusRoute(activeRouteId));
    window.addEventListener('resize', ()=>setTimeout(()=>map.invalidateSize(),180));

    ROUTES.forEach(route=>routeStates.set(route.id, createState(route)));
    renderAll(true);
    ensureRoad(activeRouteId,true);
    queuePrefetchOthers();
    if (window.innerWidth<=900) document.body.classList.add('sidebar-collapsed');
    setTimeout(()=>map.invalidateSize(),160);
  </script>
