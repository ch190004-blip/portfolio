<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Time Reactive Art</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    overflow: hidden;
    font-family: "Segoe UI", sans-serif;
    /* 加入一點放大，為了讓背景有空間可以移動 */
    background-size: 110% 110%; 
    background-position: center;
    background-repeat: no-repeat;
    /* 讓照片切換時有平滑的淡入淡出感 */
    transition: background-image 3s ease-in-out; 
    /* 海洋緩慢漂移的動態效果 */
    animation: ocean-drift 30s ease-in-out infinite alternate; 
}

/* 背景漂移動畫，營造真實海洋流動感 */
@keyframes ocean-drift {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
}

/* 漸層遮罩融合 - 讓天色變化更自然 */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
    /* 遮罩顏色變化時的平滑過渡 */
    transition: background 3s ease-in-out; 
}

/* 時間顯示優化 */
.clock {
    position: absolute;
    bottom: 80px;
    width: 100%;
    text-align: center;
    font-size: 4.5rem;
    letter-spacing: 6px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.95);
    /* 加上兩層陰影讓文字在亮色背景也能看清楚 */
    text-shadow: 0 4px 20px rgba(0,0,0,0.6), 0 0 40px rgba(0,150,255,0.4);
    z-index: 10;
}

/* 小月曆 */
.mini-calendar {
    position: absolute;
    bottom: 30px;
    width: 100%;
    text-align: center;
    font-size: 1.2rem;
    font-weight: 400;
    letter-spacing: 2px;
    color: rgba(255, 255, 255, 0.85);
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    z-index: 10;
}

/* 寫實魚 */
.fish {
    position: absolute;
    width: 100px; /* 調整為適合寫實比例 */
    transition: 12s linear;
    opacity: 0.85;
    cursor: pointer;
    z-index: 5;
    /* 加一點陰影讓魚更有立體感 */
    filter: drop-shadow(0px 8px 6px rgba(0,0,0,0.4)); 
}
</style>
</head>

<body>

<div class="overlay" id="overlay"></div>
<div class="clock" id="clock"></div>
<div class="mini-calendar" id="calendar"></div>

<script>

/* ===== 時鐘與小月曆 ===== */
function updateTimeAndDate(){
    const now = new Date();
    
    // 時間
    const timeOptions = { hour: '2-digit', minute: '2-digit', hour12: false };
    document.getElementById("clock").innerText = now.toLocaleTimeString('zh-TW', timeOptions);

    // 小月曆 (格式：2024年X月X日 星期X)
    const dateOptions = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
    document.getElementById("calendar").innerText = now.toLocaleDateString('zh-TW', dateOptions);
}
setInterval(updateTimeAndDate, 1000);
updateTimeAndDate();


/* ===== 天色與真實照片切換 ===== */
function updateBackground(){
    const hour = new Date().getHours();
    const body = document.body;
    const overlay = document.getElementById("overlay");

    // 沿用你原本精選的 Unsplash 照片，加上遮罩顏色來強化時間氛圍
    if(hour >= 5 && hour < 11){
        // 🌅 早晨
        body.style.backgroundImage = "url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e')";
        overlay.style.background = "linear-gradient(180deg, rgba(255,150,80,0.2), rgba(0,20,50,0.4))";
    }
    else if(hour >= 11 && hour < 17){
        // 🌊 日間
        body.style.backgroundImage = "url('https://images.unsplash.com/photo-1500375592092-40eb2168fd21')";
        overlay.style.background = "linear-gradient(180deg, rgba(0,100,200,0.1), rgba(0,20,50,0.3))";
    }
    else if(hour >= 17 && hour < 19){
        // 🌇 黃昏
        body.style.backgroundImage = "url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee')";
        overlay.style.background = "linear-gradient(180deg, rgba(200,80,50,0.3), rgba(0,10,30,0.6))";
    }
    else{
        // 🌌 夜晚
        body.style.backgroundImage = "url('https://images.unsplash.com/photo-1470770841072-f978cf4d019e')";
        overlay.style.background = "linear-gradient(180deg, rgba(0,0,20,0.5), rgba(0,0,10,0.8))";
    }
}
updateBackground();
setInterval(updateBackground, 60000);


/* ===== 寫實魚動畫 ===== */
function createFish(){
    const fish = document.createElement("img");
    
    // 【圖片防失效終極解法】
    // 目前我先放了一隻維基百科上的寫實熱帶魚。
    // 強烈建議：去網路抓一張去背的魚(png檔)，存在跟 index.html 同一個資料夾，然後把下面這行改成 fish.src = "./fish.png";
    fish.src = "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Snapper.png/320px-Snapper.png";
    fish.classList.add("fish");

    document.body.appendChild(fish);
    swim(fish);

    fish.addEventListener("click", () => {
        swim(fish, true);
    });
}

function swim(fish, fast=false){
    const x = Math.random() * window.innerWidth;
    // 讓魚盡量在畫面的中下半部游動（比較像在水裡）
    const y = (Math.random() * (window.innerHeight * 0.6)) + (window.innerHeight * 0.3);

    fish.style.left = x + "px";
    fish.style.top = y + "px";
    fish.style.transition = fast ? "1.5s ease-out" : "15s linear";

    fish.style.transform = x > window.innerWidth / 2 ? "scaleX(-1)" : "scaleX(1)";
}

// 產生 3 條魚
for(let i=0; i<3; i++){
    setTimeout(createFish, i * 2000); // 讓魚錯開出現
}

</script>

</body>
</html>
