<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Time Reactive Art - Evolved</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:black;
    font-family:"Segoe UI",sans-serif;
}

canvas{
    position:absolute;
    top:0;
    left:0;
}

.clock{
    position:absolute;
    bottom:60px;
    width:100%;
    text-align:center;
    font-size:4rem;
    letter-spacing:4px;
    font-weight:200;
    color:white;
    text-shadow:0 0 40px rgba(0,150,255,0.8);
    pointer-events:none;
}
</style>
</head>

<body>

<canvas id="glCanvas"></canvas>
<canvas id="particleCanvas"></canvas>
<div class="clock" id="clock"></div>

<script>

/* ============================
   基本設定
============================ */

const glCanvas = document.getElementById("glCanvas");
const gl = glCanvas.getContext("webgl");

const particleCanvas = document.getElementById("particleCanvas");
const ctx = particleCanvas.getContext("2d");

function resize(){
    glCanvas.width = window.innerWidth;
    glCanvas.height = window.innerHeight;
    particleCanvas.width = window.innerWidth;
    particleCanvas.height = window.innerHeight;
    gl.viewport(0,0,glCanvas.width,glCanvas.height);
}
resize();
window.addEventListener("resize",resize);


/* ============================
   Shader
============================ */

const vertexShaderSrc = `
attribute vec2 position;
void main(){
    gl_Position = vec4(position,0.0,1.0);
}
`;

const fragmentShaderSrc = `
precision mediump float;

uniform vec2 u_resolution;
uniform float u_time;
uniform vec2 u_touch;

float wave(vec2 p){
    float d = distance(p,u_touch);
    return sin(10.0*d - u_time*4.0) * 0.02;
}

void main(){
    vec2 uv = gl_FragCoord.xy / u_resolution;

    float ripple = wave(uv);

    float ocean =
        0.3 + 0.3*sin(uv.y*10.0 + u_time*0.5)
        + ripple;

    vec3 color = vec3(
        0.0,
        0.4 + ocean,
        0.7 + ocean*0.5
    );

    gl_FragColor = vec4(color,1.0);
}
`;

function compile(type,src){
    const shader = gl.createShader(type);
    gl.shaderSource(shader,src);
    gl.compileShader(shader);
    return shader;
}

const program = gl.createProgram();
gl.attachShader(program,compile(gl.VERTEX_SHADER,vertexShaderSrc));
gl.attachShader(program,compile(gl.FRAGMENT_SHADER,fragmentShaderSrc));
gl.linkProgram(program);
gl.useProgram(program);

const buffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buffer);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([
    -1,-1,
    1,-1,
    -1,1,
    1,1
]),gl.STATIC_DRAW);

const pos = gl.getAttribLocation(program,"position");
gl.enableVertexAttribArray(pos);
gl.vertexAttribPointer(pos,2,gl.FLOAT,false,0,0);

const uTime = gl.getUniformLocation(program,"u_time");
const uRes = gl.getUniformLocation(program,"u_resolution");
const uTouch = gl.getUniformLocation(program,"u_touch");


/* ============================
   魚群系統 (簡化 Boids)
============================ */

let fishes = [];

class Fish{
    constructor(){
        this.x = Math.random()*window.innerWidth;
        this.y = Math.random()*window.innerHeight;
        this.vx = (Math.random()-0.5)*2;
        this.vy = (Math.random()-0.5)*2;
    }

    update(){
        // 跟隨滑鼠
        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        this.vx += dx * 0.0005;
        this.vy += dy * 0.0005;

        this.x += this.vx;
        this.y += this.vy;

        ctx.fillStyle="white";
        ctx.beginPath();
        ctx.arc(this.x,this.y,4,0,Math.PI*2);
        ctx.fill();
    }
}

for(let i=0;i<30;i++){
    fishes.push(new Fish());
}


/* ============================
   星光粒子 (夜晚)
============================ */

let stars = [];

function createStars(){
    stars=[];
    for(let i=0;i<150;i++){
        stars.push({
            x:Math.random()*window.innerWidth,
            y:Math.random()*window.innerHeight,
            size:Math.random()*2
        });
    }
}

createStars();


/* ============================
   滑鼠
============================ */

let mouse={x:0,y:0};

window.addEventListener("mousemove",(e)=>{
    mouse.x=e.clientX;
    mouse.y=window.innerHeight-e.clientY;
});


/* ============================
   動畫
============================ */

let start = Date.now();

function render(){

    let time = (Date.now()-start)/1000;

    gl.uniform1f(uTime,time);
    gl.uniform2f(uRes,glCanvas.width,glCanvas.height);
    gl.uniform2f(uTouch,
        mouse.x/glCanvas.width,
        mouse.y/glCanvas.height
    );

    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

    ctx.clearRect(0,0,particleCanvas.width,particleCanvas.height);

    // 魚
    fishes.forEach(f=>f.update());

    // 夜晚星星
    let hour = new Date().getHours();
    if(hour>=19 || hour<5){
        ctx.fillStyle="white";
        stars.forEach(s=>{
            ctx.globalAlpha=Math.random();
            ctx.beginPath();
            ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
            ctx.fill();
        });
        ctx.globalAlpha=1;
    }

    requestAnimationFrame(render);
}
render();


/* ============================
   時鐘
============================ */

function updateClock(){
    const now=new Date();
    document.getElementById("clock").innerText=
        now.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock,1000);
updateClock();

</script>
</body>
</html>
