<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Time Reactive Art</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:"Segoe UI",sans-serif;
    transition: background 2s ease;
    background-size:cover;
    background-position:center;
}

/* 漸層遮罩融合 */
.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(
        180deg,
        rgba(0,0,0,0.3),
        rgba(0,0,0,0.6)
    );
    pointer-events:none;
    transition: background 2s ease;
}

/* 時間顯示 */
.clock{
    position:absolute;
    bottom:60px;
    width:100%;
    text-align:center;
    font-size:4rem;
    letter-spacing:4px;
    font-weight:200;
    color:white;
    text-shadow:0 0 40px rgba(0,150,255,0.8);
}

/* 魚 */
.fish{
    position:absolute;
    width:90px;
    transition:10s linear;
    opacity:0.9;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="overlay" id="overlay"></div>
<div class="clock" id="clock"></div>

<script>

/* ===== 時鐘 ===== */
function updateClock(){
    const now = new Date();
    const options = { hour: '2-digit', minute: '2-digit' };
    document.getElementById("clock").innerText =
        now.toLocaleTimeString('zh-TW', options);
}
setInterval(updateClock,1000);
updateClock();

/* ===== 時間背景切換 ===== */

function updateBackground(){

    const hour = new Date().getHours();
    const body = document.body;
    const overlay = document.getElementById("overlay");

    if(hour >= 5 && hour < 11){
        // 🌅 早晨
        body.style.backgroundImage =
        "url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e')";
        overlay.style.background =
        "linear-gradient(180deg, rgba(255,180,80,0.3), rgba(0,0,0,0.5))";
    }
    else if(hour >= 11 && hour < 17){
        // 🌊 日間
        body.style.backgroundImage =
        "url('https://images.unsplash.com/photo-1500375592092-40eb2168fd21')";
        overlay.style.background =
        "linear-gradient(180deg, rgba(0,150,255,0.2), rgba(0,0,0,0.5))";
    }
    else if(hour >= 17 && hour < 19){
        // 🌇 黃昏
        body.style.backgroundImage =
        "url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee')";
        overlay.style.background =
        "linear-gradient(180deg, rgba(255,100,50,0.4), rgba(0,0,0,0.6))";
    }
    else{
        // 🌌 夜晚
        body.style.backgroundImage =
        "url('https://images.unsplash.com/photo-1470770841072-f978cf4d019e')";
        overlay.style.background =
        "linear-gradient(180deg, rgba(0,0,50,0.6), rgba(0,0,0,0.8))";
    }
}

updateBackground();
setInterval(updateBackground,60000);

/* ===== 魚動畫 ===== */

function createFish(){
    const fish = document.createElement("img");
    fish.src =
    "https://upload.wikimedia.org/wikipedia/commons/3/3b/Fish_icon.svg";
    fish.classList.add("fish");

    document.body.appendChild(fish);
    swim(fish);

    fish.addEventListener("click",()=>{
        swim(fish,true);
    });
}

function swim(fish, fast=false){
    const x = Math.random()*window.innerWidth;
    const y = Math.random()*window.innerHeight;

    fish.style.left = x+"px";
    fish.style.top = y+"px";
    fish.style.transition = fast ? "1.5s ease-out" : "12s linear";

    fish.style.transform =
        x > window.innerWidth/2
        ? "scaleX(-1)"
        : "scaleX(1)";
}

for(let i=0;i<3;i++){
    createFish();
}

</script>

</body>
</html>
