<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Touch Desktop</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(180deg,#0A192F,#112240);
    color:#E6F1FF;
}

/* 粒子畫布 */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* 中央控制圓盤 */
.control{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:260px;
    height:260px;
    border-radius:50%;
    border:2px solid #64FFDA;
    background:rgba(255,255,255,0.03);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:1.3rem;
    letter-spacing:1px;
    transition:0.3s ease;
}

.control:active{
    transform:translate(-50%,-50%) scale(1.1);
}

/* 波紋 */
.ripple{
    position:absolute;
    border-radius:50%;
    background:rgba(100,255,218,0.4);
    transform:scale(0);
    animation:ripple 0.6s linear;
}

@keyframes ripple{
    to{
        transform:scale(4);
        opacity:0;
    }
}

/* 時鐘 */
.clock{
    position:absolute;
    bottom:40px;
    width:100%;
    text-align:center;
    font-size:2.2rem;
    color:#F2C14E;
    letter-spacing:2px;
}

/* 角落快捷 */
.corner{
    position:absolute;
    padding:16px 24px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;
    transition:0.3s;
    cursor:pointer;
}

.corner:hover{
    border-color:#64FFDA;
    background:rgba(100,255,218,0.08);
}

.top-left{top:30px;left:30px;}
.top-right{top:30px;right:30px;}
.bottom-left{bottom:30px;left:30px;}
.bottom-right{bottom:30px;right:30px;}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="control" id="control">
    TOUCH
</div>

<div class="clock" id="clock"></div>

<div class="corner top-left">📁 Projects</div>
<div class="corner top-right">🌐 Web</div>
<div class="corner bottom-left">🎵 Music</div>
<div class="corner bottom-right">⚙ Mode</div>

<script>
/* 時鐘 */
function updateClock(){
    const now=new Date();
    const time=now.toLocaleTimeString();
    document.getElementById("clock").innerText=time;
}
setInterval(updateClock,1000);
updateClock();

/* 波紋效果 */
const control=document.getElementById("control");
control.addEventListener("click",function(e){
    const ripple=document.createElement("span");
    ripple.classList.add("ripple");
    ripple.style.width=ripple.style.height="120px";
    ripple.style.left=e.offsetX-60+"px";
    ripple.style.top=e.offsetY-60+"px";
    control.appendChild(ripple);
    setTimeout(()=>ripple.remove(),600);
});

/* 粒子背景 */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<60;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2,
        d:Math.random()*0.5+0.2
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="rgba(100,255,218,0.5)";
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();
        p.y+=p.d;
        if(p.y>canvas.height)p.y=0;
    });
    requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
