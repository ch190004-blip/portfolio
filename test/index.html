<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>My Portfolio Showcase</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="hero">
        <h1>我的前端展示頁</h1>
        <p>HTML / CSS / JavaScript</p>
        <a href="#about" class="btn">往下看看</a>
    </section>

    <section id="about" class="about reveal">
        <h2>關於我</h2>
        <p>
            這是一個可嵌入 Google 協作平台的動畫展示頁。
            包含滾動動畫、技能條動畫與卡片效果。
        </p>
    </section>

    <section class="skills">
        <h2>技能展示</h2>

        <div class="skill">
            <span>HTML</span>
            <div class="bar">
                <div class="progress html"></div>
            </div>
        </div>

        <div class="skill">
            <span>CSS</span>
            <div class="bar">
                <div class="progress css"></div>
            </div>
        </div>

        <div class="skill">
            <span>JavaScript</span>
            <div class="bar">
                <div class="progress js"></div>
            </div>
        </div>
    </section>

    <section class="projects">
        <h2>專案展示</h2>

        <div class="card">專案 1</div>
        <div class="card">專案 2</div>
        <div class="card">專案 3</div>

    </section>

    <footer>
        © 2026 My Portfolio
    </footer>

    <script src="script.js"></script>
</body>
</html>
