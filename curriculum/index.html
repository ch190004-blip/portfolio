<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聖心高中課表查詢系統 Final</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
:root {
  --bg: #0b1320; --panel:#121c2f; --panel-2:#18243b; --card:#1e2d49;
  --soft:#9fb4d3; --text:#eef4ff; --accent:#7bc8ff; --accent-2:#8edfb0;
  --warn:#ffcf86; --danger:#ff9c94; --border:rgba(255,255,255,.10);
  --shadow:0 12px 32px rgba(0,0,0,.28);
  
  /* 年級專屬色系 */
  --j7-bg: rgba(84, 160, 255, .22); --j7-br: rgba(122, 181, 255, .50);
  --j8-bg: rgba(103, 194, 126, .22); --j8-br: rgba(138, 220, 160, .48);
  --j9-bg: rgba(255, 178, 102, .22); --j9-br: rgba(255, 196, 136, .52);
  --h1-bg: rgba(184, 128, 255, .22); --h1-br: rgba(209, 173, 255, .50);
  --h2-bg: rgba(130, 155, 255, .22); --h2-br: rgba(169, 186, 255, .50);
  --h3-bg: rgba(255, 132, 189, .22); --h3-br: rgba(255, 173, 214, .50);
}
* { box-sizing:border-box; }
body {
  margin:0; font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
  background: radial-gradient(circle at top right, rgba(123,200,255,.14), transparent 26%),
              radial-gradient(circle at left bottom, rgba(142,223,176,.09), transparent 22%),
              linear-gradient(180deg, #08101d, #0f1a2d 38%, #0b1320 100%);
  color:var(--text);
}
header {
  padding:22px 28px 18px; border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:20; backdrop-filter: blur(12px); background:rgba(8,16,29,.86);
}
h1 { margin:0; font-size:clamp(1.4rem,3vw,2rem); letter-spacing:.03em; }
.topbar { display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-top:14px; }
.badge { display:inline-flex; align-items:center; gap:8px; padding:6px 12px; border-radius:999px; background:rgba(255,255,255,.05); border:1px solid var(--border); color:var(--text); font-size:.95rem; font-variant-numeric: tabular-nums; }
.badge.ok { color:#c5f5d2; }

main { padding:24px 28px 40px; }
.tabs { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
.tab-btn { cursor:pointer; border:1px solid var(--border); background:rgba(255,255,255,.04); color:var(--text); padding:10px 14px; border-radius:12px; font-size:.95rem; }
.tab-btn.active { background:linear-gradient(135deg, rgba(123,200,255,.20), rgba(142,223,176,.16)); border-color:rgba(123,200,255,.45); }

.panel { display:none; }
.panel.active { display:block; }
.grid { display:grid; grid-template-columns:repeat(12,1fr); gap:16px; }
.card { background:linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.015)); border:1px solid var(--border); border-radius:18px; box-shadow:var(--shadow); padding:20px; height: 100%; }

/* Dashboard 格線控制 */
.col-6 { grid-column: span 6; }
.col-12 { grid-column: span 12; }

.big { font-size:clamp(1.5rem,4vw,2.2rem); font-weight:800; line-height:1.2; margin:10px 0; }
.meta, .small-note { color:var(--soft); line-height:1.5; font-size:0.95rem; word-break: break-word;}

.controls { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
.controls select, .controls button { border-radius:12px; border:1px solid var(--border); background:#ffffff; color:#000000; padding:10px 14px; font-size:1rem; }
.controls select { min-width:220px; }
.controls button { cursor:pointer; font-weight: bold; }
.controls .primary { background:linear-gradient(135deg, rgba(123,200,255,.2), rgba(142,223,176,.18)); border-color:rgba(123,200,255,.45); color: #fff;}

.lesson-list { display:grid; gap:10px; }
.lesson-item { background:rgba(255,255,255,.035); border:1px solid var(--border); border-radius:12px; padding:10px 14px; }
.lesson-item .main { font-weight:700; line-height:1.4; word-break: break-word;}
.lesson-item .sub { color:#c6d6ee; line-height:1.5; margin-top:4px; font-size: 0.9rem; word-break: break-word;}

.table-wrap { overflow:auto; border:1px solid var(--border); border-radius:16px; }
table { width:100%; border-collapse:collapse; min-width:960px; table-layout: fixed; }
th, td { border:1px solid rgba(255,255,255,.08); padding:10px 8px; vertical-align:top; text-align:left; word-wrap: break-word; }
th { background:#16243d; position:sticky; top:0; z-index:1; }
th:first-child, td:first-child { width: 85px; text-align: center; }

/* 儲存格與年級專屬顏色 */
.cell-box { border-radius:10px; padding:8px; margin-bottom:6px; border:1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.02);}
.cell-box:last-child { margin-bottom:0; }
.cell-main { font-weight:700; line-height:1.3; font-size: 0.95rem; }
.cell-sub { color:#c3d4ee; font-size:.85rem; line-height:1.4; margin-top:4px; }
.cell-empty { color:#647b9c; font-size:.85rem; }

.cell-box.grade-j7, .wall-card.grade-j7 { background:var(--j7-bg); border-color:var(--j7-br); }
.cell-box.grade-j8, .wall-card.grade-j8 { background:var(--j8-bg); border-color:var(--j8-br); }
.cell-box.grade-j9, .wall-card.grade-j9 { background:var(--j9-bg); border-color:var(--j9-br); }
.cell-box.grade-h1, .wall-card.grade-h1 { background:var(--h1-bg); border-color:var(--h1-br); }
.cell-box.grade-h2, .wall-card.grade-h2 { background:var(--h2-bg); border-color:var(--h2-br); }
.cell-box.grade-h3, .wall-card.grade-h3 { background:var(--h3-bg); border-color:var(--h3-br); }

.tag { display:inline-block; padding:4px 10px; border-radius:999px; border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.05); color:#dbe9ff; font-size:.85rem; margin:4px 6px 0 0; font-weight: bold;}
.tag.grade-j7 { background:var(--j7-bg); border-color:var(--j7-br); }
.tag.grade-j8 { background:var(--j8-bg); border-color:var(--j8-br); }
.tag.grade-j9 { background:var(--j9-bg); border-color:var(--j9-br); }
.tag.grade-h1 { background:var(--h1-bg); border-color:var(--h1-br); }
.tag.grade-h2 { background:var(--h2-bg); border-color:var(--h2-br); }
.tag.grade-h3 { background:var(--h3-bg); border-color:var(--h3-br); }

/* 即時上課網格 */
.wall-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; margin-top: 16px;}
.wall-card { border:1px solid var(--border); border-radius:14px; padding:14px; display:flex; flex-direction:column; justify-content:flex-start; gap: 6px; transition: transform 0.2s;}
.wall-card.empty { opacity:.6; filter: grayscale(50%); background: rgba(255,255,255,0.02) !important; border-color: var(--border) !important; }
.class-name { font-size:1.15rem; font-weight:900; line-height: 1; margin-bottom: 2px;}
.subject { font-size:1.05rem; line-height:1.3; }
.teacher { color:#c8d8f1; line-height:1.4; font-size: 0.9rem; }

.display-header { display:flex; justify-content:space-between; gap:12px; align-items:center; flex-wrap:wrap; border-bottom: 1px solid var(--border); padding-bottom: 14px; }
.display-sub { font-size: 1.05rem; font-weight: bold; color: var(--accent); }

/* 下課預覽專用標籤 */
.upcoming-tag {
  font-size:0.75em; color:#ffd56a; border:1px solid #ffd56a; 
  padding: 2px 6px; border-radius:6px; margin-left:6px; 
  vertical-align: middle; letter-spacing: 0.05em;
}

@media (max-width: 1100px) {
  .col-6 { grid-column: span 12; }
  .wall-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
}
@media (max-width:768px){

  header{
    padding:14px;
  }

  main{
    padding:14px;
  }

  /* tabs 滑動 */
  .tabs{
    flex-wrap:nowrap;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    gap:8px;
  }

  .tab-btn{
    flex-shrink:0;
    padding:10px 12px;
    font-size:.9rem;
  }

  /* select 滿版 */
  .controls select{
    min-width:100%;
  }

  /* 表格容器 */
  .table-wrap{
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }

  /* 表格寬度自適應 */
  table{
    min-width:600px;
    font-size:.9rem;
  }

  th{
    font-size:.85rem;
    padding:8px 6px;
  }

  td{
    padding:8px 6px;
  }

  /* cell 卡片縮小 */
  .cell-box{
    padding:6px;
    margin-bottom:4px;
  }

  .cell-main{
    font-size:.85rem;
    line-height:1.2;
  }

  .cell-sub{
    font-size:.75rem;
  }

  /* dashboard 卡片 */
  .wall-grid{
    grid-template-columns:1fr;
  }

  .class-name{
    font-size:1rem;
  }

  .subject{
    font-size:.95rem;
  }

  .teacher{
    font-size:.8rem;
  }

  /* badge */
  .badge{
    font-size:.85rem;
    padding:5px 10px;
  }

}
  
</style>
</head>
<body>
<header>
  <h1>聖心高中課表查詢系統</h1>
  <div class="topbar">
    <div class="badge" id="nowBadge">載入時間中…</div>
    <div class="badge ok" id="teacherBadge">計算中...</div>
    <div class="badge ok" id="classBadge">計算中...</div>
    <div class="badge ok" id="roomBadge">計算中...</div>
  </div>
</header>

<main>
  <div class="tabs">
    <button class="tab-btn active" data-tab="dashboard">總覽與即時顯示</button>
    <button class="tab-btn" data-tab="teacher">教師查詢</button>
    <button class="tab-btn" data-tab="class">班級查詢</button>
    <button class="tab-btn" data-tab="room">教室查詢</button>
    <button class="tab-btn" data-tab="tables">大總表</button>
  </div>

  <section class="panel active" id="dashboard">
    <div class="grid">
      <div class="card col-6">
        <h2 style="margin:0 0 4px 0; color:var(--text);">現在狀態</h2>
        <div class="big" id="heroPeriod" style="color:var(--accent);">-</div>
        <div class="meta">系統會依台北時間自動判斷目前上課情況，並同步帶出各班教室與教師狀態。</div>
        <div class="legend" style="margin-top: 14px;">
          <span class="tag grade-j7">國七</span>
          <span class="tag grade-j8">國八</span>
          <span class="tag grade-j9">國九</span>
          <span class="tag grade-h1">高一</span>
          <span class="tag grade-h2">高二</span>
          <span class="tag grade-h3">高三</span>
        </div>
      </div>

      <div class="card col-6">
        <h2 style="margin:0 0 8px 0;">今日調代課資料</h2>
        <div class="small-note" id="substituteMeta" style="margin-bottom:12px;">與試算表同步中...</div>
        <div id="substituteList" style="max-height:160px; overflow-y:auto; padding-right:4px;"></div>
      </div>

      <div class="card col-12">
        <div class="display-header">
          <div>
            <h2 style="margin:0;">全校即時上課顯示</h2>
            <div class="display-sub" id="displaySub" style="margin-top:6px;">-</div>
          </div>
          <div class="controls">
            <button class="primary" onclick="toggleFullscreen()">全螢幕</button>
            <button onclick="refreshAll()">重新整理</button>
          </div>
        </div>
        <div class="wall-grid" id="wallGrid"></div>
      </div>
    </div>
  </section>

  <section class="panel" id="teacher">
    <div class="card">
      <div class="controls" style="margin-bottom:16px;">
        <select id="teacherSelect"></select>
        <button class="primary" onclick="renderTeacher()">查詢教師</button>
      </div>
      <div id="teacherCurrent" class="lesson-list"></div>
      <div class="table-wrap" style="margin-top:16px;"><table id="teacherTable"></table></div>
    </div>
  </section>

  <section class="panel" id="class">
    <div class="card">
      <div class="controls" style="margin-bottom:16px;">
        <select id="classSelect"></select>
        <button class="primary" onclick="renderClass()">查詢班級</button>
      </div>
      <div id="classCurrent" class="lesson-list"></div>
      <div class="table-wrap" style="margin-top:16px;"><table id="classTable"></table></div>
    </div>
  </section>

  <section class="panel" id="room">
    <div class="card">
      <div class="controls" style="margin-bottom:16px;">
        <select id="roomSelect"></select>
        <button class="primary" onclick="renderRoom()">查詢教室</button>
      </div>
      <div id="roomCurrent" class="lesson-list"></div>
      <div class="table-wrap" style="margin-top:16px;"><table id="roomTable"></table></div>
    </div>
  </section>

  <section class="panel" id="tables">
    <div class="card">
      <div class="controls" style="margin-bottom:12px;">
        <select id="daySelect"></select>
        <button class="primary" onclick="renderDayTable()">切換星期</button>
        <button onclick="exportCurrentDayTable()">匯出 CSV</button>
      </div>
      <div class="small-note">表格保持最原始排課設定，不受調代課影響。</div>
      <div class="table-wrap" style="margin-top:16px;"><table id="dayTable"></table></div>
    </div>
  </section>
</main>

<script src="data.js"></script>

<script>
/* =========================================================
   1. Google 試算表調代課陣列抓取系統 (支援調課雙向轉換)
========================================================= */
const RAW_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTMAfnrLA8lnVeikakXNnsJ0gh-tJP3PHkX1vd5hlhGU9BjbP7KgTQ-divWsg7NQCdb1BaGq6OOrJpC/pubhtml";
const SHEET_CSV_URL = RAW_URL.replace(/\/pubhtml.*/, '/pub?output=csv');

let substituteData = [];
let currentWeekDates = {}; 

function parseCSV(text) {
    const result = []; let row = []; let col = ''; let inQuotes = false;
    for (let i = 0; i < text.length; i++) {
        let c = text[i];
        if (inQuotes) {
            if (c === '"') { if (text[i + 1] === '"') { col += '"'; i++; } else { inQuotes = false; } } else { col += c; }
        } else {
            if (c === '"') { inQuotes = true; }
            else if (c === ',') { row.push(col.trim()); col = ''; }
            else if (c === '\n') { row.push(col.trim()); result.push(row); col = ''; row = []; }
            else if (c !== '\r') { col += c; }
        }
    }
    if (col || row.length) { row.push(col.trim()); result.push(row); }
    return result;
}

function parseDateStr(rawDate) {
    if (!rawDate) return "";
    let nums = rawDate.split(/[\/\-]/).map(n => parseInt(n, 10));
    if (nums.length >= 3) {
        if (nums[0] > 1000) return `${nums[1]}/${nums[2]}`;
        else return `${nums[0]}/${nums[1]}`;
    } else if (nums.length === 2) {
        return `${nums[0]}/${nums[1]}`;
    }
    return rawDate;
}

async function loadSubstituteData() {
    try {
        const res = await fetch(SHEET_CSV_URL + "&t=" + new Date().getTime(), { cache: "no-store" });
        const text = await res.text();
        if (text.trim().startsWith("<")) return;
        
        const rows = parseCSV(text); 
        let parsed = [];
        
        for (let i = 1; i < rows.length; i++) {
            const cols = rows[i];
            if(cols.length >= 8 && cols[5]) {
                let rawDate1 = cols[0] ? cols[0].trim() : ""; 
                if(!rawDate1) continue;
                let date1 = parseDateStr(rawDate1);
                if(!date1 || date1.includes("NaN")) continue;
                
                let periodMatch1 = String(cols[5]).match(/\d+/);
                if(!periodMatch1) continue;
                let period1 = parseInt(periodMatch1[0], 10);
                
                let origTeacher1 = cols[2] ? cols[2].trim() : "";
                let className1 = cols[3] ? cols[3].trim() : "";
                let typeVal = cols[6] ? cols[6].trim() : "";
                let subTeacher1 = cols[7] ? cols[7].trim() : "";

                parsed.push({ date: date1, origTeacher: origTeacher1, className: className1, period: period1, type: typeVal, subTeacher: subTeacher1 });

                if (typeVal === "調" && cols.length >= 11 && cols[8] && cols[10]) {
                    let rawDate2 = cols[8].trim();
                    if (rawDate2) {
                        let date2 = parseDateStr(rawDate2);
                        let periodMatch2 = String(cols[10]).match(/\d+/);
                        if (date2 && !date2.includes("NaN") && periodMatch2) {
                            let period2 = parseInt(periodMatch2[0], 10);
                            let className2 = cols[9] ? cols[9].trim() : className1;
                            parsed.push({
                                date: date2, origTeacher: subTeacher1, className: className2, period: period2, type: "調(補)", subTeacher: origTeacher1
                            });
                        }
                    }
                }
            }
        }
        substituteData = parsed;
        refreshAll(); 
    } catch(e) { console.error("❌ 調代課資料載入失敗：", e); }
}

function updateWeekDates() {
    const now = new Date(); const dist = now.getDay() === 0 ? -6 : 1 - now.getDay();
    const monday = new Date(now); monday.setDate(now.getDate() + dist);
    const days = ["星期一", "星期二", "星期三", "星期四", "星期五"];
    for (let i = 0; i < 5; i++) {
        const d = new Date(monday); d.setDate(monday.getDate() + i);
        currentWeekDates[days[i]] = `${d.getMonth() + 1}/${d.getDate()}`;
    }
}

function isClassMatch(sheetClass, systemClass) {
    if (!sheetClass || !systemClass) return false;
    if (sheetClass === systemClass || sheetClass.includes(systemClass) || systemClass.includes(sheetClass)) return true;
    const gradeMatch = systemClass.substring(0, 2); 
    const clean = sheetClass.replace(/組/g, '').replace(/班/g, '');
    if (clean.includes(gradeMatch)) {
        if (systemClass === "高一") return true;
        if (systemClass.includes("A") && (clean.includes("A") || clean.includes("Ａ"))) return true;
        if (systemClass.includes("B") && (clean.includes("B") || clean.includes("Ｂ"))) return true;
        if (systemClass.includes("理") && clean.includes("理")) return true;
        if (systemClass.includes("文") && clean.includes("文")) return true;
    }
    return false;
}
function findSubForClass(dateStr, period, className) { return substituteData.find(sub => sub.date === dateStr && sub.period === period && isClassMatch(sub.className, className)); }

/* =========================================================
   2. 核心排版與渲染邏輯
========================================================= */
const TEACHERS = DATA.teachers; const CLASSES = DATA.classes; const ROOMS = DATA.rooms;
const DAYS = ["星期一","星期二","星期三","星期四","星期五"]; const PERIODS = DATA.periods;

document.getElementById('teacherBadge').textContent = `教師 ${TEACHERS.length} 位`;
document.getElementById('classBadge').textContent = `班級 ${CLASSES.length} 個`;
document.getElementById('roomBadge').textContent = `教室 ${ROOMS.length} 間`;

function parseHM(hm) { const [h,m] = hm.split(':').map(Number); return h * 60 + m; }

function getTaipeiDateParts() {
  const now = new Date();
  const parts = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false, weekday: 'long' }).formatToParts(now);
  const obj = Object.fromEntries(parts.map(p => [p.type, p.value]));
  const day = {"Monday":"星期一","Tuesday":"星期二","Wednesday":"星期三","Thursday":"星期四","Friday":"星期五"}[obj.weekday] || obj.weekday;
  const hm = Number(obj.hour)*60 + Number(obj.minute);
  let current = null, next = null;
  for (const p of PERIODS) {
    const start = parseHM(p.start), end = parseHM(p.end);
    if (hm >= start && hm <= end) { current = p; break; }
    if (!current && hm < start && !next) next = p;
  }
  return { date:`${obj.year}/${obj.month}/${obj.day}`, time:`${obj.hour}:${obj.minute}:${obj.second}`, day, current, next, todayStr: `${parseInt(obj.month, 10)}/${parseInt(obj.day, 10)}` };
}

// 狀態字眼優化
function currentLabel(info) {
  if (info.current) return `${info.day} 第${info.current.period}節 (${info.current.start}-${info.current.end})`;
  if (info.next) return `${info.day} 下課時間 ➔ 即將進入 第${info.next.period}節`;
  return `${info.day} 今日課程已結束`;
}

function slotClassEntries(className, day, period) { return (((DATA.classSchedule[className] || {})[day] || {})[String(period)] || []); }
function slotTeacherEntries(teacher, day, period) { return (((DATA.teacherSchedule[teacher] || {})[day] || {})[String(period)] || []); }
function slotRoomEntries(room, day, period) { return (((DATA.roomSchedule[room] || {})[day] || {})[String(period)] || []); }
function roomText(rooms) { return rooms && rooms.length ? rooms.join('、') : '未指定'; }

function gradeClass(name) {
  if (!name) return '';
  if (name.includes('國七')) return 'grade-j7'; if (name.includes('國八')) return 'grade-j8'; if (name.includes('國九')) return 'grade-j9';
  if (name.includes('高一')) return 'grade-h1'; if (name.includes('高二')) return 'grade-h2'; if (name.includes('高三')) return 'grade-h3';
  return '';
}
function tagClassForClasses(classes) { return gradeClass(Array.isArray(classes) ? classes.join(' ') : (classes || '')); }

function formatTeacherEntries(entries) {
  if (!entries.length) return '本節無課';
  return entries.map(e => `${e.subject} / ${e.classes.join('、')} / 室：${roomText(e.rooms)}`).join('；');
}
function formatClassEntries(entries) {
  if (!entries.length) return '本節無課';
  return entries.map(e => `${e.subject} / ${e.teacher} / 室：${roomText(e.rooms)}`).join('；');
}

// 乾淨的 Cell (四個查詢分頁專用)
function buildCell(entries, kind) {
  if (!entries.length) return `<span class="cell-empty">—</span>`;
  return entries.map(e => {
    let cls = kind === 'teacher' ? tagClassForClasses(e.classes) : gradeClass(e.rawClass || e.className || '');
    let sub = kind === 'teacher' ? `班:${e.classes.join('、')}<br>室:${roomText(e.rooms)}` : 
              kind === 'class' ? `師:${e.teacher}<br>室:${roomText(e.rooms)}` : 
              kind === 'room' ? `${e.subject||'分組課'}<br>${e.teacher||''}` : 
              `${e.teacher}<br>${roomText(e.rooms)}`;
    let main = kind === 'room' ? (e.rawClass||'未標示') : e.subject;
    return `<div class="cell-box ${cls}"><div class="cell-main">${main}</div><div class="cell-sub">${sub}</div></div>`;
  }).join('');
}

function buildWeeklyTable(headLabel, rowsBuilder) {
  let html = `<thead><tr><th>${headLabel}</th>${DAYS.map(d => `<th>${d}</th>`).join('')}</tr></thead><tbody>`;
  for (const p of PERIODS) {
    html += `<tr><td>第${p.period}節<br><span class="cell-sub">${p.start}-${p.end}</span></td>`;
    for (const d of DAYS) html += `<td>${rowsBuilder(d, p.period)}</td>`;
    html += `</tr>`;
  }
  return html + '</tbody>';
}

function findNextTeacherLesson(teacher, info) {
  const schedule = DATA.teacherSchedule[teacher] || {}; if (!info.day) return null;
  const sIdx = DAYS.indexOf(info.day); if (sIdx < 0) return null;
  for (let di = sIdx; di < DAYS.length; di++) {
    for (const p of PERIODS) {
      if ((di > sIdx || (!info.current ? (info.next ? p.period >= info.next.period : true) : p.period > info.current.period)) && (schedule[DAYS[di]]?.[String(p.period)]?.length)) 
        return { day: DAYS[di], period: p.period, time: p, entries: schedule[DAYS[di]][String(p.period)], nextWeek: false };
    }
  }
  for (let di = 0; di < sIdx; di++) {
    for (const p of PERIODS) {
      if (schedule[DAYS[di]]?.[String(p.period)]?.length) 
        return { day: DAYS[di], period: p.period, time: p, entries: schedule[DAYS[di]][String(p.period)], nextWeek: true };
    }
  }
  return null;
}

// ======================
// 四大純淨分頁渲染
// ======================
function renderTeacher() {
  const teacher = document.getElementById('teacherSelect').value; const info = getTaipeiDateParts();
  const next = findNextTeacherLesson(teacher, info);
  document.getElementById('teacherCurrent').innerHTML = `<div class="lesson-item"><div class="main">${teacher}｜狀態</div><div class="sub">${info.current ? (slotTeacherEntries(teacher, info.day, info.current.period).length?'本節有課':'本節空堂') : '非上課時段'} <br> ${next? `下節課：${next.nextWeek?'下週':''}${next.day} 第${next.period}節`:'無後續課程'}</div></div>`;
  document.getElementById('teacherTable').innerHTML = buildWeeklyTable('節次', (d, p) => buildCell(slotTeacherEntries(teacher, d, p), 'teacher'));
}
function renderClass() {
  const cls = document.getElementById('classSelect').value; const info = getTaipeiDateParts();
  document.getElementById('classCurrent').innerHTML = `<div class="lesson-item ${gradeClass(cls)}"><div class="main">${cls}</div></div>`;
  document.getElementById('classTable').innerHTML = buildWeeklyTable('節次', (d, p) => buildCell(slotClassEntries(cls, d, p).map(e=>({...e, rawClass:cls})), 'class'));
}
function renderRoom() {
  const room = document.getElementById('roomSelect').value; const info = getTaipeiDateParts();
  document.getElementById('roomCurrent').innerHTML = `<div class="lesson-item"><div class="main">${room}</div></div>`;
  document.getElementById('roomTable').innerHTML = buildWeeklyTable('節次', (d, p) => buildCell(slotRoomEntries(room, d, p), 'room'));
}
function renderDayTable() {
  const day = document.getElementById('daySelect').value;
  let html = `<thead><tr><th>節次</th>${CLASSES.map(c => `<th class="${gradeClass(c)}">${c}</th>`).join('')}</tr></thead><tbody>`;
  for (const p of PERIODS) {
    html += `<tr><td>第${p.period}節</td>`;
    for (const c of CLASSES) html += `<td>${buildCell(slotClassEntries(c, day, p.period).map(e=>({...e,rawClass:c})), 'day')}</td>`;
    html += `</tr>`;
  }
  document.getElementById('dayTable').innerHTML = html + '</tbody>';
}

function exportCurrentDayTable() {
  const day = document.getElementById('daySelect').value; const rows = [['節次 / 時間', ...CLASSES]];
  for (const p of PERIODS) {
    const row = [`第${p.period}節`];
    for (const c of CLASSES) {
      const e = slotClassEntries(c, day, p.period);
      row.push(e.length ? e.map(x=>`${x.subject}｜${x.teacher}`).join(' / ') : '');
    }
    rows.push(row);
  }
  const csv = '\ufeff' + rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'})); a.download = `總表_${day}.csv`; a.click();
}

// ======================
// 總覽與即時顯示 (下課預覽邏輯)
// ======================
function renderDashboard() {
  const info = getTaipeiDateParts();
  document.getElementById('heroPeriod').textContent = currentLabel(info);
  
  // 今日調代課
  const todaySubs = substituteData.filter(s => s.date === info.todayStr).sort((a,b) => a.period - b.period);
  const subBox = document.getElementById('substituteList');
  if (todaySubs.length > 0) {
      document.getElementById('substituteMeta').textContent = `本日共有 ${todaySubs.length} 筆調代課異動`;
      subBox.innerHTML = `<div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:10px;">` + todaySubs.map(s => `
          <div class="lesson-item" style="border-left:4px solid var(--warn);">
              <div class="main" style="color:var(--warn);">${s.className} (第${s.period}節)</div>
              <div class="sub">
                <span style="text-decoration:line-through; opacity:0.6;">原: ${s.origTeacher}</span><br>
                代: <strong style="color:#fff; font-size:1.05em;">${s.subTeacher}</strong> <span style="opacity:0.8; font-size:0.85em;">(${s.type})</span>
              </div>
          </div>`).join('') + `</div>`;
  } else {
      document.getElementById('substituteMeta').textContent = "與試算表已同步！";
      subBox.innerHTML = `<div class="lesson-item"><div class="main" style="color: #c5f5d2;">✅ 今日目前無調代課資訊</div></div>`;
  }

  // 渲染即時上課顯示牆 (加入下課預覽邏輯)
  const wall = document.getElementById('wallGrid');
  
  let targetPeriodInfo = info.current ? info.current : info.next;
  let isNext = !info.current && info.next;

  if (!targetPeriodInfo) {
    document.getElementById('displaySub').textContent = "今日課程已結束";
    wall.innerHTML = CLASSES.map(c => `<div class="wall-card empty ${gradeClass(c)}"><div class="class-name">${c}</div><div class="subject">今日課程已結束 / 非上課日</div><div class="teacher">-</div></div>`).join('');
    return;
  }

  document.getElementById('displaySub').textContent = isNext ? `下課中 ➔ 預覽第${targetPeriodInfo.period}節` : `第${targetPeriodInfo.period}節 進行中`;
  
  wall.innerHTML = CLASSES.map(c => {
    const entries = slotClassEntries(c, info.day, targetPeriodInfo.period);
    const subInfo = findSubForClass(info.todayStr, targetPeriodInfo.period, c);
    
    let titleSuffix = isNext ? `<span class="upcoming-tag">即將</span>` : "";
    let cardStyle = isNext ? "opacity:0.85;" : ""; 

    if (subInfo) {
        let oSubj = entries.length ? entries[0].subject : "課程";
        return `<div class="wall-card ${gradeClass(c)}" style="border:2px solid var(--warn); box-shadow:0 0 15px rgba(255,207,134,0.3); ${cardStyle}">
          <div class="class-name">${c} ${titleSuffix}</div>
          <div class="subject"><span style="text-decoration:line-through; opacity:0.6">${oSubj}</span> <span style="color:var(--warn); font-weight:bold;">[${subInfo.type}]</span></div>
          <div class="teacher">
            <span style="opacity:0.6; text-decoration:line-through;">原: ${subInfo.origTeacher}</span><br>
            <span style="color:var(--warn); font-size:1.05rem; font-weight:bold;">代: ${subInfo.subTeacher}</span>
          </div>
        </div>`;
    }
    
    if (!entries.length) return `<div class="wall-card empty ${gradeClass(c)}" style="${cardStyle}"><div class="class-name">${c} ${titleSuffix}</div><div class="subject">本節無課</div><div class="teacher">-</div></div>`;
    
    return `<div class="wall-card ${gradeClass(c)}" style="${cardStyle}">
      <div class="class-name">${c} ${titleSuffix}</div>
      <div class="subject">${entries.map(e => e.subject).join(' / ')}</div>
      <div class="teacher">${entries.map(e => `${e.teacher}｜${roomText(e.rooms)}`).join('<br>')}</div>
    </div>`;
  }).join('');
}

// 獨立的即時時鐘更新 (每1秒跳動)
function startLiveClock() {
    setInterval(() => {
        const info = getTaipeiDateParts();
        const badge = document.getElementById('nowBadge');
        if (badge) badge.textContent = `${info.date} ${info.time}｜${currentLabel(info)}`;
        document.getElementById('heroPeriod').textContent = currentLabel(info);
        
        // 每秒檢查是否跨節次，自動重繪顯示牆
        if (window.lastPeriod !== (info.current ? info.current.period : (info.next ? info.next.period + "next" : "end"))) {
            window.lastPeriod = info.current ? info.current.period : (info.next ? info.next.period + "next" : "end");
            renderDashboard();
        }
    }, 1000);
}

// 強制立刻刷新所有內容
function refreshAll() {
  updateWeekDates(); 
  renderDashboard(); renderTeacher(); renderClass(); renderRoom(); renderDayTable();
  convertTables(); 
}

function toggleFullscreen() { (!document.fullscreenElement) ? document.documentElement.requestFullscreen?.() : document.exitFullscreen?.(); }

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn, .panel').forEach(el => el.classList.remove('active'));
    btn.classList.add('active'); document.getElementById(btn.dataset.tab).classList.add('active');
  });
});

function initSelects() {
  document.getElementById('teacherSelect').innerHTML = TEACHERS.map(t => `<option value="${t}">${t}</option>`).join('');
  document.getElementById('classSelect').innerHTML = CLASSES.map(c => `<option value="${c}">${c}</option>`).join('');
  document.getElementById('roomSelect').innerHTML = ROOMS.map(r => `<option value="${r}">${r}</option>`).join('');
  document.getElementById('daySelect').innerHTML = DAYS.map(d => `<option value="${d}">${d}</option>`).join('');
  const info = getTaipeiDateParts(); if (DAYS.includes(info.day)) document.getElementById('daySelect').value = info.day;
}

function convertTables() {
  document.querySelectorAll("table").forEach(table => {
    const thead = table.querySelector("thead"); if (!thead) return; 
    const headers = [...thead.querySelectorAll("th")].map(th => th.innerText.trim());
    table.querySelectorAll("tbody tr").forEach(row => {
      [...row.children].forEach((cell, i) => { if(headers[i]) cell.setAttribute("data-label", headers[i]); });
    });
  });
}

// 啟動流程：綁定選單 -> 啟動每秒時鐘 -> 立刻渲染一次 -> 抓資料 -> 定時重整排版
initSelects();
startLiveClock();
refreshAll(); 
loadSubstituteData();
setInterval(refreshAll, 60000); // 改為每 60 秒背景同步一次最新試算表資料
</script>
